name: Build & Release (priority)

# ───────────────────────────────────────────────────────────────
# PRIORITY WORKFLOW — Linux + Flatpak (fast)
#
# GitHub gates the artifact Download button on the ENTIRE workflow
# run finishing. Splitting fast platforms into their own workflow
# means their artifacts are UI-downloadable in ~8 min, independent
# of slower runners (Android/Windows/macOS/iOS) which now live in
# .github/workflows/build-extras.yml.
#
# Release semantics preserved: this workflow creates the GitHub
# Release on tag push; the extras workflow appends its assets via
# `gh release upload --clobber` once the release exists.
# ───────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      flutter_version:
        description: 'Flutter version'
        required: false
        default: '3.38.4'
      build_number:
        description: 'Build number override (leave empty for auto)'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

env:
  FLUTTER_VERSION: ${{ github.event.inputs.flutter_version || '3.38.4' }}
  JAVA_VERSION: '17'
  APP_NAME: vorsitzer

# Default every job to read-only. Jobs that actually need write access
# (release publishes a Release) opt in via their own permissions: block.
# This narrows the blast radius if any third-party action is compromised
# — the leaked GITHUB_TOKEN can't push code or rewrite the repo from a
# job that doesn't need to.
permissions:
  contents: read

# Single concurrency lane across ALL refs. When a newer tag arrives while
# an older build is still running/queued, the older one is cancelled — only
# the latest version ships. Replaces the per-ref grouping that piled up 5
# parallel builds for v6.30.14/15/16 in the queue.
concurrency:
  group: vorsitzer-release
  cancel-in-progress: true

# ============================================================
# SECRETS REQUIRED:
# ============================================================
# (Android/Apple signing secrets live in the extras workflow.
#  This workflow only needs the dart-define runtime secrets.)
#
# Runtime dart-defines (all platforms):
#   TURN_HOST (TURN creds are now ephemeral — fetched at runtime via api/auth/turn_credentials.php)
#   HAFAS_AID
#   ROUTINE_AES_KEY_V2
#
# Deploy (still gated off — kept for re-enabling):
#   DEPLOY_HOST / DEPLOY_PORT / DEPLOY_USER / DEPLOY_SSH_KEY / DEPLOY_PATH
# ============================================================

jobs:
  # ──────────────────────────────────────────────
  # Determine version info (shared by all jobs in this workflow)
  # ──────────────────────────────────────────────
  version:
    name: "📋 Version Info"
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      # (The old self-hosted runner needed a pre-checkout step here to unmount
      # leftover flatpak-builder rofiles-fuse mounts from a cancelled run. Cloud
      # runners start from a clean VM every time, so it is gone.)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION_LINE=$(grep '^version:' pubspec.yaml)
          VERSION_NAME=$(echo "$VERSION_LINE" | sed 's/version: //' | cut -d'+' -f1)
          BUILD_NUMBER_DEFAULT=$(echo "$VERSION_LINE" | sed 's/version: //' | cut -d'+' -f2)
          BUILD_NUMBER="${{ github.event.inputs.build_number }}"
          if [ -z "$BUILD_NUMBER" ]; then
            BUILD_NUMBER="$BUILD_NUMBER_DEFAULT"
          fi
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION_NAME+$BUILD_NUMBER"

      - name: Verify update_service.dart matches pubspec.yaml
        run: |
          # The footer in the running app reads UpdateService.currentVersion /
          # currentBuildNumber, which are hardcoded constants in
          # lib/services/update_service.dart. If they desync from pubspec.yaml,
          # the user sees the wrong version in the footer (and the changelog
          # dialog will not match the running build). Fail the build EARLY so
          # the developer notices before publishing the release.
          VERSION_NAME="${{ steps.version.outputs.version_name }}"
          BUILD_NUMBER="${{ steps.version.outputs.build_number }}"
          DART_VERSION=$(grep -oE "currentVersion = '[^']*'" lib/services/update_service.dart | sed -E "s/currentVersion = '([^']*)'/\\1/")
          DART_BUILD=$(grep -oE 'currentBuildNumber = [0-9]+' lib/services/update_service.dart | awk '{print $3}')
          echo "  pubspec.yaml          → $VERSION_NAME+$BUILD_NUMBER"
          echo "  update_service.dart   → $DART_VERSION+$DART_BUILD"
          if [ "$DART_VERSION" != "$VERSION_NAME" ] || [ "$DART_BUILD" != "$BUILD_NUMBER" ]; then
            echo "::error file=lib/services/update_service.dart::Version mismatch — bump currentVersion='$VERSION_NAME' / currentBuildNumber=$BUILD_NUMBER to match pubspec.yaml"
            exit 1
          fi
          echo "  ✅ versions match"

  # ══════════════════════════════════════════════
  #  STATIC ANALYSIS
  # ══════════════════════════════════════════════
  #
  # Run flutter analyze BEFORE the Linux build. If analyze finds errors,
  # we fail early instead of wasting the whole build on an artifact that
  # would be thrown away. flutter-action's cache keeps the SDK + pub cache
  # warm between runs.
  analyze:
    name: "🔍 Static analysis"
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2  # v2
        with:
          flutter-version: ${{ github.event.inputs.flutter_version || '3.38.4' }}
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        run: |
          # Errors fail the build; warnings + infos are tolerated (the
          # codebase still has legitimate deprecation warnings around the
          # Radio API migration to RadioGroup and a few unused private
          # fields). Tighten later by dropping --no-fatal-warnings once
          # those are cleaned up.
          flutter analyze --no-fatal-warnings --no-fatal-infos

  # ══════════════════════════════════════════════
  #  LINUX BUILDS
  # ══════════════════════════════════════════════

  # ──────────────────────────────────────────────
  # Linux (raw bundle for Flatpak job)
  # ──────────────────────────────────────────────
  linux:
    name: "🐧 Linux"
    needs: [version, analyze]
    # GitHub-hosted runner. Everything the old self-hosted VM had pre-installed
    # (Flutter SDK, GTK/clang toolchain, libmpv) has to be set up per run below.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2  # v2
        with:
          flutter-version: ${{ github.event.inputs.flutter_version || '3.38.4' }}
          cache: true

      - name: Install Linux build dependencies
        # Cloud runners ship none of the desktop toolchain. clang/cmake/ninja +
        # GTK are what `flutter build linux` itself needs; the rest are plugin
        # requirements: libmpv (media_kit), appindicator (tray_manager),
        # libsecret (flutter_secure_storage), cups (printing), alsa (audio).
        env:
          # Ubuntu 24.04 pulls in needrestart, which without a noninteractive
          # frontend opens a service-restart prompt mid-install and hangs the
          # step forever (no TTY to answer it). Force apt fully non-interactive.
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev \
            libmpv-dev mpv \
            libayatana-appindicator3-dev \
            libsecret-1-dev libjsoncpp-dev \
            libcups2-dev libasound2-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        env:
          # tray_manager calls app_indicator_new(), which libayatana-appindicator
          # marks deprecated upstream — a warning we can't fix without forking the
          # plugin. Harmless on the cloud runner's clang-18, kept because newer
          # toolchains promote it to an error by default.
          CFLAGS: "-Wno-error=deprecated-declarations"
          CXXFLAGS: "-Wno-error=deprecated-declarations"
        run: |
          flutter config --enable-linux-desktop
          # --no-tree-shake-icons saves ~15 s by skipping the icon font
          # tree-shaking step. We ship the material icons font as-is; the
          # ~80 KB savings aren't worth the build-time cost.
          flutter build linux \
            --release \
            --no-tree-shake-icons \
            --dart-define=TURN_HOST=${{ secrets.TURN_HOST }} \
            --dart-define=HAFAS_AID=${{ secrets.HAFAS_AID }} \
            --dart-define=ROUTINE_AES_KEY_V2=${{ secrets.ROUTINE_AES_KEY_V2 }} \
            --dart-define=STARTUP_DIAG_KEY=${{ secrets.VORSITZER_STARTUP_DIAG_KEY }} \
            --build-name=${{ needs.version.outputs.version_name }} \
            --build-number=${{ needs.version.outputs.build_number }}

      - name: Upload raw bundle for Flatpak job
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: linux-bundle
          path: build/linux/x64/release/bundle/

      # .deb for Debian/Ubuntu/Mint (native install, alternative to Flatpak).
      # Deps declared manually with alternatives (the runner is newer than the
      # target, so dpkg-shlibdeps would over-pin versions). The app's own plugin
      # libs are already bundled under opt/.../lib.
      - name: Package .deb
        env:
          VERSION_NAME: ${{ needs.version.outputs.version_name }}
        run: |
          set -euo pipefail
          APP=icd360sev-vorsitzer
          EXE=icd360sev_vorsitzer
          ROOT=deb-root
          rm -rf "$ROOT"
          install -d "$ROOT/DEBIAN" "$ROOT/opt/$APP" "$ROOT/usr/bin" \
                     "$ROOT/usr/share/applications" \
                     "$ROOT/usr/share/icons/hicolor/256x256/apps"
          cp -a build/linux/x64/release/bundle/. "$ROOT/opt/$APP/"
          cat > "$ROOT/usr/bin/vorsitzer" <<SH
          #!/bin/sh
          exec /opt/$APP/$EXE "\$@"
          SH
          chmod 0755 "$ROOT/usr/bin/vorsitzer"
          cp assets/app_icon_preview.png "$ROOT/usr/share/icons/hicolor/256x256/apps/vorsitzer.png"
          cat > "$ROOT/usr/share/applications/vorsitzer.desktop" <<'DESK'
          [Desktop Entry]
          Name=ICD360S Vorsitzer
          Comment=Vorsitzer-Portal für ICD360S e.V.
          Exec=/usr/bin/vorsitzer
          Icon=vorsitzer
          Terminal=false
          Type=Application
          Categories=Office;Network;
          StartupWMClass=icd360sev_vorsitzer
          DESK
          # ── Auto-update: a root systemd timer checks GitHub every minute and
          #    installs a newer .deb silently. version_vorsitzer.json + the .deb
          #    are stable GitHub Release assets (no API rate limit).
          install -d "$ROOT/lib/systemd/system"
          cat > "$ROOT/opt/$APP/auto-update.sh" <<'UPD'
          #!/bin/bash
          set -u
          PKG=icd360sev-vorsitzer
          REPO=ICD360S-e-V/vorsitzer
          LOG=/var/log/vorsitzer-update.log
          _log(){ echo "$(date '+%F %T') $*" >> "$LOG" 2>/dev/null; }
          J=$(curl -fsSL --max-time 20 "https://github.com/$REPO/releases/latest/download/version_vorsitzer.json" 2>/dev/null) || exit 0
          LATEST=$(printf '%s' "$J" | grep -oE '"version"[[:space:]]*:[[:space:]]*"[^"]+"' | grep -oE '[0-9][0-9.]+' | head -1)
          [ -z "$LATEST" ] && exit 0
          INSTALLED=$(dpkg-query -W -f='${Version}' "$PKG" 2>/dev/null || echo 0)
          dpkg --compare-versions "$LATEST" gt "$INSTALLED" 2>/dev/null || exit 0
          _log "update available: $INSTALLED -> $LATEST"
          URL="https://github.com/$REPO/releases/download/v${LATEST}/vorsitzer-${LATEST}.deb"
          TMP=$(mktemp /tmp/vorsitzer-XXXXXX.deb) || exit 0
          if curl -fsSL --max-time 600 -o "$TMP" "$URL" 2>/dev/null && [ -s "$TMP" ]; then
            if dpkg -i "$TMP" >>"$LOG" 2>&1 || apt-get -y -f install >>"$LOG" 2>&1; then
              _log "installed $LATEST"
            else
              _log "install FAILED for $LATEST"
            fi
          else
            _log "download FAILED for $LATEST"
          fi
          rm -f "$TMP"
          UPD
          chmod 0755 "$ROOT/opt/$APP/auto-update.sh"
          cat > "$ROOT/lib/systemd/system/vorsitzer-update.service" <<'SVC'
          [Unit]
          Description=Vorsitzer auto-update
          After=network-online.target
          Wants=network-online.target
          [Service]
          Type=oneshot
          ExecStart=/opt/icd360sev-vorsitzer/auto-update.sh
          SVC
          cat > "$ROOT/lib/systemd/system/vorsitzer-update.timer" <<'TMR'
          [Unit]
          Description=Vorsitzer auto-update check (every minute)
          [Timer]
          OnBootSec=60
          OnUnitActiveSec=60
          Persistent=true
          [Install]
          WantedBy=timers.target
          TMR
          cat > "$ROOT/DEBIAN/postinst" <<'POST'
          #!/bin/bash
          set -e
          chmod 0755 /opt/icd360sev-vorsitzer/auto-update.sh 2>/dev/null || true
          systemctl daemon-reload 2>/dev/null || true
          systemctl enable --now vorsitzer-update.timer 2>/dev/null || true
          exit 0
          POST
          cat > "$ROOT/DEBIAN/prerm" <<'PRERM'
          #!/bin/bash
          set -e
          if [ "$1" = "remove" ] || [ "$1" = "purge" ]; then
            systemctl disable --now vorsitzer-update.timer 2>/dev/null || true
          fi
          exit 0
          PRERM
          chmod 0755 "$ROOT/DEBIAN/postinst" "$ROOT/DEBIAN/prerm"
          INSTALLED_SIZE=$(du -sk "$ROOT/opt" | cut -f1)
          cat > "$ROOT/DEBIAN/control" <<CTRL
          Package: $APP
          Version: ${VERSION_NAME}
          Section: net
          Priority: optional
          Architecture: amd64
          Maintainer: ICD360S e.V. <claudeai@icd360s.de>
          Installed-Size: ${INSTALLED_SIZE}
          Depends: libgtk-3-0 | libgtk-3-0t64, libglib2.0-0 | libglib2.0-0t64, libsecret-1-0, libmpv2 | libmpv1, libayatana-appindicator3-1, curl
          Description: ICD360S e.V. Vorsitzer Portal
           Vorsitzer-App (Flutter) fuer ICD360S e.V. - Verwaltung, Chat, Cloud,
           Remote-Desktop u.v.m.
          CTRL
          dpkg-deb --build --root-owner-group "$ROOT" "vorsitzer-${VERSION_NAME}.deb"
          ls -la vorsitzer-*.deb
          dpkg-deb -I "vorsitzer-${VERSION_NAME}.deb"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: linux-deb
          path: vorsitzer-*.deb

  # ──────────────────────────────────────────────
  # Flatpak (.flatpak single-file bundle for Fedora Kinoite / Flathub-style)
  # ──────────────────────────────────────────────
  flatpak:
    name: "📦 Flatpak"
    needs: [version, linux]
    runs-on: ubuntu-latest
    # Build inside Flathub's official image for our exact runtime. It ships a
    # modern flatpak-builder (≥1.4.4, which forces cmake CMAKE_INSTALL_LIBDIR=lib)
    # plus the freedesktop 24.08 Platform+Sdk with the patched meson (no lib64) —
    # so every module installs to /app/lib. That is the root fix for the lib64
    # breakage (cmake AND meson) we hit on a bare ubuntu-latest runner with apt's
    # old flatpak-builder 1.4.2; it also brings eu-strip and all build tooling,
    # so no apt/runtime install is needed here. --privileged is required for the
    # bwrap sandbox flatpak-builder runs each module in.
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: linux-bundle
          path: flatpak/bundle

      - name: Ensure flathub remote (for --install-deps-from)
        run: |
          flatpak remote-add --if-not-exists --user \
            flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Cache flatpak-builder build state
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          # flatpak-builder runs in working-directory: flatpak, so its default
          # state dir (downloads + per-module build cache + ccache) is here.
          path: flatpak/.flatpak-builder
          key: flatpak-builder-${{ hashFiles('flatpak/de.icd360s.Vorsitzer.yml', 'flatpak/*.patch') }}
          restore-keys: flatpak-builder-

      - name: Make binary executable
        run: chmod +x flatpak/bundle/icd360sev_vorsitzer

      - name: Import Flatpak signing GPG key
        # Key ID 244C2F8A661420E8, "ICD360S e.V. Flatpak Builds". The container
        # starts with an empty keyring, so this import is what makes signing work
        # at all. gpg --import is idempotent.
        env:
          GPG_PRIVATE_KEY: ${{ secrets.FLATPAK_GPG_PRIVATE_KEY }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "::error::FLATPAK_GPG_PRIVATE_KEY secret missing"
            exit 1
          fi
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import 2>&1 | tail -5
          gpg --list-secret-keys --keyid-format LONG 244C2F8A661420E8 | head -3

      - name: Clone Flathub shared-modules
        run: |
          rm -rf flatpak/shared-modules
          git clone --depth 1 --branch master https://github.com/flathub/shared-modules.git flatpak/shared-modules

      - name: Inject current version into AppStream metainfo
        run: |
          VERSION="${{ needs.version.outputs.version_name }}"
          DATE=$(date -u +%Y-%m-%d)
          # Replace the entire <releases>...</releases> block with a single fresh entry
          python3 - <<PYEOF
          import re
          path = 'flatpak/de.icd360s.Vorsitzer.metainfo.xml'
          with open(path, 'r', encoding='utf-8') as f:
              content = f.read()
          new_releases = f'''  <releases>
            <release version="$VERSION" date="$DATE">
              <description>
                <p>Version $VERSION — neueste Aktualisierung.</p>
              </description>
            </release>
          </releases>'''
          content = re.sub(r'  <releases>.*?</releases>', new_releases, content, flags=re.DOTALL)
          with open(path, 'w', encoding='utf-8') as f:
              f.write(content)
          print(f'Injected version=$VERSION date=$DATE into metainfo.xml')
          PYEOF
          cat flatpak/de.icd360s.Vorsitzer.metainfo.xml

      - name: Build Flatpak
        # Direct flatpak-builder call instead of the GitHub action wrapper, so
        # we keep control of GPG signing + repo layout. The per-module build
        # cache under flatpak/.flatpak-builder/ (restored by actions/cache above)
        # skips libass/libplacebo/uchardet/libmpv when the manifest is unchanged,
        # so a Dart-only change avoids the full libmpv rebuild.
        #
        # No --force-clean — that flag wipes the state dir before every build,
        # defeating the restored cache and rebuilding the libmpv stack every run.
        # --ccache caches C/C++ object files so partial invalidations still hit
        # object-level cache. --disable-rofiles-fuse: rofiles-fuse is unreliable
        # inside a container even with --privileged, so use plain copies. We
        # clean the output dir ourselves to avoid a stale .flatpak leaking in.
        working-directory: flatpak
        run: |
          rm -rf ../build ../repo
          # --gpg-sign on flatpak-builder + build-bundle signs every commit
          # and the bundle metadata with the ICD360S key. Without these,
          # modern Flatpak refuses to install from custom remotes ("Can't
          # pull from untrusted non-gpg verified remote").
          flatpak-builder --user --install-deps-from=flathub \
            --repo=../repo --ccache --disable-rofiles-fuse \
            --gpg-sign=244C2F8A661420E8 \
            ../build de.icd360s.Vorsitzer.yml
          flatpak build-bundle \
            --runtime-repo=https://icd360s-e-v.github.io/vorsitzer/icd360s-vorsitzer.flatpakrepo \
            --gpg-sign=244C2F8A661420E8 \
            ../repo \
            ../vorsitzer-${{ needs.version.outputs.version_name }}.flatpak \
            de.icd360s.Vorsitzer
          # Embed the public-key base64 (committed at .github/flatpak-pubkey.b64)
          # so Flatpak auto-configures gpg-verify=true with this exact key
          # when a user installs via the descriptor.
          PUBKEY=$(tr -d '\n' < "$GITHUB_WORKSPACE/.github/flatpak-pubkey.b64")
          cat > ../de.icd360s.Vorsitzer.flatpakref <<REFEOF
          [Flatpak Ref]
          Title=ICD360S e.V. Vorsitzer
          Name=de.icd360s.Vorsitzer
          Branch=master
          Url=https://icd360s-e-v.github.io/vorsitzer/repo/
          SuggestRemoteName=icd360s-vorsitzer
          Homepage=https://github.com/ICD360S-e-V/vorsitzer
          Description=ICD360S e.V. Vorsitzer-Portal — installs with auto-update wired to the GitHub Pages OSTree repo.
          IsRuntime=false
          RuntimeRepo=https://flathub.org/repo/flathub.flatpakrepo
          GPGKey=$PUBKEY
          REFEOF

      - name: Upload Flatpak bundle artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: linux-flatpak-bundle
          path: vorsitzer-*.flatpak

      - name: Upload Flatpak ref descriptor
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: linux-flatpakref
          path: de.icd360s.Vorsitzer.flatpakref

      # ── OSTree repo for auto-update via `flatpak update` ──
      - name: Update repo metadata + generate static deltas
        run: |
          flatpak build-update-repo --generate-static-deltas --prune --prune-depth=3 \
            --gpg-sign=244C2F8A661420E8 \
            --title="ICD360S e.V. Vorsitzer" repo
          du -sh repo

      - name: Assemble gh-pages publish tree
        run: |
          mkdir -p pages-out
          cp -r repo pages-out/repo
          PUBKEY=$(tr -d '\n' < "$GITHUB_WORKSPACE/.github/flatpak-pubkey.b64")
          cat > pages-out/icd360s-vorsitzer.flatpakrepo <<EOF
          [Flatpak Repo]
          Title=ICD360S e.V. Vorsitzer
          Url=https://icd360s-e-v.github.io/vorsitzer/repo/
          Homepage=https://github.com/ICD360S-e-V/vorsitzer
          Comment=Vorsitzer Portal Auto-Update Repository
          Description=Auto-update Flatpak repository for the ICD360S e.V. Vorsitzer portal app.
          NoDeps=true
          GPGKey=$PUBKEY
          EOF
          cat > pages-out/index.html <<'EOF'
          <!doctype html>
          <html lang="de">
          <head>
            <meta charset="utf-8">
            <title>ICD360S e.V. Vorsitzer — Flatpak Repo</title>
            <style>
              body { font-family: -apple-system, system-ui, sans-serif; max-width: 720px; margin: 4rem auto; padding: 0 1rem; line-height: 1.55; color: #222; }
              code, pre { background: #f4f4f4; border-radius: 4px; font-size: 0.9rem; }
              code { padding: 0.1rem 0.35rem; }
              pre { padding: 1rem; overflow-x: auto; }
              a { color: #1a73e8; }
            </style>
          </head>
          <body>
            <h1>ICD360S e.V. Vorsitzer — Flatpak Repository</h1>
            <p>Auto-Update für die Vorsitzer-App. Einmal hinzufügen, danach läuft <code>flatpak update</code> automatisch beim nächsten Release.</p>
            <h2>Installation</h2>
            <pre>flatpak remote-add --user --if-not-exists icd360s-vorsitzer \
            https://icd360s-e-v.github.io/vorsitzer/icd360s-vorsitzer.flatpakrepo
          flatpak install --user icd360s-vorsitzer de.icd360s.Vorsitzer</pre>
            <h2>Update</h2>
            <pre>flatpak update --user</pre>
            <p>Quellcode: <a href="https://github.com/ICD360S-e-V/vorsitzer">github.com/ICD360S-e-V/vorsitzer</a></p>
          </body>
          </html>
          EOF

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: flatpak-pages
          path: pages-out
          if-no-files-found: error

  # ══════════════════════════════════════════════
  #  FLATPAK auto-update repo → GitHub Pages
  # ══════════════════════════════════════════════
  #
  # Publishes the OSTree repo so KDE Discover / `flatpak update` can pull
  # new releases without the user having to uninstall + install the
  # bundle by hand every time.
  deploy-flatpak-pages:
    name: "📤 Publish Flatpak repo to GitHub Pages"
    needs: flatpak
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: flatpak-pages
          path: pages-out

      # Replaces peaceiris/actions-gh-pages (Node 20 deprecated). Uses the
      # maintained actions/checkout + a manual git push — independent of any
      # third-party action with its own runtime lifecycle.
      - name: Checkout gh-pages branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: gh-pages
          path: gh-pages-checkout
          fetch-depth: 1
          persist-credentials: false
        continue-on-error: true  # branch may not exist on first run

      - name: Deploy to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pull untrusted-shape values into env so they cannot be interpreted
          # by the shell parser. github.repository is owner/repo, github.ref_name
          # is the tag name — both safe in practice, but env-var passing is the
          # correct pattern (see workflow-injection guidance).
          GH_REPOSITORY: ${{ github.repository }}
          GH_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          REMOTE_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GH_REPOSITORY}.git"
          if [ ! -d gh-pages-checkout/.git ]; then
            # First-ever deploy: bootstrap an empty orphan branch.
            mkdir -p gh-pages-checkout
            cd gh-pages-checkout
            git init -b gh-pages
            git remote add origin "$REMOTE_URL"
          else
            cd gh-pages-checkout
            git remote set-url origin "$REMOTE_URL"
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # keep_files: false equivalent — wipe everything except .git, then refill.
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a ../pages-out/. .
          touch .nojekyll  # enable_jekyll: false equivalent
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "deploy: flatpak repo ${GH_REF_NAME}"
            git push origin gh-pages
          fi

  # ══════════════════════════════════════════════
  #  GITHUB RELEASE (only on tag push)
  # ══════════════════════════════════════════════
  #
  # Creates the Release object with auto-generated notes and uploads
  # priority artifacts (Linux + Flatpak). The extras workflow appends
  # Android/Windows/macOS/iOS assets to the same Release via
  # `gh release upload --clobber` once this job finishes.
  release:
    name: "🚀 Create Release"
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - version
      - linux
      - flatpak
    # GitHub-hosted: `gh` CLI is preinstalled here but NOT on our self-hosted
    # Linux runner. This step only consumes the already-built artifacts via
    # download-artifact, so it doesn't need the self-hosted runner's Flutter
    # / Android SDK. Same pattern as mail repo's release-upload-android job.
    runs-on: ubuntu-latest
    permissions:
      contents: write   # gh release create/upload writes a Release object on the tag
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          path: artifacts

      - name: List all artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        # Replaces softprops/action-gh-release@v2 (Node 20 deprecated). The gh
        # CLI is preinstalled on every runner (self-hosted + GitHub-hosted),
        # maintained by GitHub, and has no third-party Node runtime to age out.
        # Behaviour matches the previous action:
        #   - tag = github.ref_name
        #   - title = "v<version_name>"
        #   - generate-notes = on
        #   - draft / prerelease = off (defaults)
        # Only the priority workflow's artifacts are uploaded here. Extras
        # (apk/aab/zip/dmg/ipa) are appended by build-extras.yml via
        # `gh release upload --clobber` after this job finishes. The
        # .flatpakref is the update-capable installer; users should prefer
        # it over the .flatpak bundle (which is offline-only).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REF_NAME: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
          VERSION_NAME: ${{ needs.version.outputs.version_name }}
        run: |
          set -euo pipefail
          # Collect files from previously-downloaded artifacts.
          mapfile -t FILES < <(find artifacts -type f \( -name '*.flatpak' -o -name '*.flatpakref' -o -name '*.deb' \) | sort)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::error::No .flatpak or .flatpakref artifacts found under artifacts/"
            exit 1
          fi
          printf 'Will publish:\n'; printf '  %s\n' "${FILES[@]}"
          # We never checkout the repo in this job (download-artifact + gh only),
          # so `gh` has no .git directory to infer the target repo from. The
          # GH_REPO env var (= owner/repo) makes every gh subcommand explicit.
          # Idempotent: if a Release for this tag already exists, reuse it.
          if gh release view "$GH_REF_NAME" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Release $GH_REF_NAME exists — uploading flatpak artifacts."
            gh release upload "$GH_REF_NAME" "${FILES[@]}" --clobber --repo "$GH_REPO"
          else
            echo "Creating Release $GH_REF_NAME ..."
            gh release create "$GH_REF_NAME" \
              --repo "$GH_REPO" \
              --title "v$VERSION_NAME" \
              --generate-notes \
              "${FILES[@]}"
          fi

  # ══════════════════════════════════════════════
  #  DEPLOY TO SERVER (only on tag push)
  # ══════════════════════════════════════════════
  deploy:
    name: "📤 Deploy to Server"
    # Disabled 2026-06-03: server moved behind internal Proxmox (10.10.10.5);
    # GitHub-hosted runner can no longer reach SSH. Re-enable when a self-hosted
    # runner runs inside the cluster, or restore by switching back to the public
    # bastion. Build artifacts (Linux / Flatpak in this workflow, Android /
    # Windows / macOS / iOS in build-extras.yml) and the GitHub Release step
    # still publish normally — only the SCP-to-server step is gated off.
    if: false && startsWith(github.ref, 'refs/tags/v')
    needs:
      - version
      - release
    runs-on: ubuntu-latest
    # Global serialization across all tag deploys. Builds + GitHub Releases
    # stay parallel (one per tag, preserving release history); only this final
    # SCP+JSON step is queued. cancel-in-progress means a newer tag arriving
    # while an older deploy is in-flight will kill the older one — exactly
    # what we want when 4 PRs merge in rapid succession.
    concurrency:
      group: deploy-vorsitzer-prod
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      # Belt-and-suspenders against the rare case where GH Actions evicts a
      # newer queued run and lets the older one survive: explicitly skip if
      # any newer tag already exists.
      - name: Guard — abort if a newer tag exists
        id: guard
        run: |
          git fetch --tags --force --quiet
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ "$LATEST" != "${GITHUB_REF_NAME}" ]; then
            echo "::warning::Newer tag $LATEST exists on remote; skipping deploy of ${GITHUB_REF_NAME}"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${GITHUB_REF_NAME} is the newest; proceeding"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        if: steps.guard.outputs.skip != 'true'
        with:
          path: artifacts

      - name: Organize artifacts with fixed filenames
        if: steps.guard.outputs.skip != 'true'
        run: |
          mkdir -p deploy/android deploy/windows deploy/linux deploy/flatpak
          cp artifacts/android-universal-apk/*.apk deploy/android/vorsitzer.apk || true
          find artifacts -type f -name "*.zip" -path "*windows*" -exec cp {} deploy/windows/vorsitzer-windows.zip \; || true
          find artifacts -type f -name "*.flatpak" -exec cp {} deploy/linux/vorsitzer.flatpak \; || true
          # Extract OSTree repo (auto-update via `flatpak update`)
          if [ -f artifacts/linux-flatpak-repo/flatpak-repo.tar.gz ]; then
            tar -xzf artifacts/linux-flatpak-repo/flatpak-repo.tar.gz -C deploy/flatpak/
            echo "=== Flatpak repo tree ==="
            find deploy/flatpak -maxdepth 3 -type d
          fi
          echo "=== Deploy tree ==="
          find deploy -type f -exec ls -lh {} \;

      - name: Setup SSH
        if: steps.guard.outputs.skip != 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT }} -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync Flatpak OSTree repo (for auto-update)
        if: steps.guard.outputs.skip != 'true'
        run: |
          PORT="${{ secrets.DEPLOY_PORT }}"
          REMOTE="${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          SSH_BASE="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          REPO_BASE="/var/www/icd360sev.icd360s.de/flatpak"

          if [ -d deploy/flatpak/repo ]; then
            ssh $SSH_BASE -p "$PORT" "$REMOTE" "mkdir -p '$REPO_BASE/repo'"

            # Recommended order to avoid clients seeing a half-updated repo:
            # 1. Upload objects + deltas (data clients will reference)
            # 2. Upload refs (small, idempotent)
            # 3. Upload summary last (this is what clients fetch to discover updates)
            rsync -av --no-perms --no-owner --no-group \
              --exclude='summary*' \
              -e "ssh $SSH_BASE -p $PORT" \
              deploy/flatpak/repo/ "$REMOTE:$REPO_BASE/repo/"

            # Summary files last
            for f in deploy/flatpak/repo/summary*; do
              [ -e "$f" ] && scp $SSH_BASE -P "$PORT" "$f" "$REMOTE:$REPO_BASE/repo/" || true
            done

            # Prune objects no longer referenced by any commit (best-effort)
            rsync -av --no-perms --no-owner --no-group --delete \
              --exclude='summary*' \
              -e "ssh $SSH_BASE -p $PORT" \
              deploy/flatpak/repo/ "$REMOTE:$REPO_BASE/repo/"

            # Descriptor + ownership
            scp $SSH_BASE -P "$PORT" deploy/flatpak/icd360s.flatpakrepo "$REMOTE:$REPO_BASE/icd360s.flatpakrepo"
            ssh $SSH_BASE -p "$PORT" "$REMOTE" "chown -R nginx:nginx '$REPO_BASE'"

            echo "Flatpak repo synced. User commands:"
            echo "  flatpak remote-add --user --if-not-exists --no-gpg-verify icd360s https://icd360sev.icd360s.de/flatpak/icd360s.flatpakrepo"
            echo "  flatpak install --user icd360s de.icd360s.Vorsitzer"
            echo "  flatpak update --user"
          fi

      - name: Upload to server (atomic via temp-name + rename)
        if: steps.guard.outputs.skip != 'true'
        run: |
          BASE="${{ secrets.DEPLOY_PATH }}"
          PORT="${{ secrets.DEPLOY_PORT }}"
          REMOTE="${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          SSH_BASE="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          RUN="${GITHUB_RUN_ID}"

          ssh $SSH_BASE -p "$PORT" "$REMOTE" "mkdir -p '$BASE'/{android,windows,linux}"

          # Per-file flow (now race-safe):
          #   1. If a current file exists on the server, copy it to _stable as the
          #      fallback for in-app rollback.
          #   2. SCP the new artifact to a unique temp name (one per workflow run).
          #   3. Atomically replace the live filename with `mv -f` (rename(2) is
          #      atomic on the same filesystem — clients never see a half-written
          #      ZIP or APK).
          # Combined with the global concurrency lock above, this means the
          # last-completed deploy wins on BOTH the ZIP and the JSON.
          for plat in android windows linux; do
            if [ -n "$(ls -A deploy/$plat/ 2>/dev/null)" ]; then
              echo "==> Uploading $plat (run $RUN) ..."
              for f in deploy/$plat/*; do
                fname=$(basename "$f")
                ext="${fname##*.}"
                base="${fname%.*}"
                tmp="$BASE/$plat/.${fname}.tmp.$RUN"
                ssh $SSH_BASE -p "$PORT" "$REMOTE" \
                  "[ -f '$BASE/$plat/$fname' ] && cp '$BASE/$plat/$fname' '$BASE/$plat/${base}_stable.${ext}' || true"
                scp $SSH_BASE -P "$PORT" "$f" "$REMOTE:$tmp"
                ssh $SSH_BASE -p "$PORT" "$REMOTE" "mv -f '$tmp' '$BASE/$plat/$fname'"
              done
            fi
          done

          ssh $SSH_BASE -p "$PORT" "$REMOTE" "chown -R nginx:nginx '$BASE' && find '$BASE' -type f | sort"

          # Remove old versioned files (vorsitzer-X.Y.Z-*) left from before the overwrite migration
          ssh $SSH_BASE -p "$PORT" "$REMOTE" "find '$BASE' -name 'vorsitzer-[0-9]*' -type f -delete 2>/dev/null; echo 'Legacy versioned files cleaned'"
          # Cleanup any orphaned .tmp.* files from cancelled runs older than 1h
          ssh $SSH_BASE -p "$PORT" "$REMOTE" "find '$BASE' -name '*.tmp.*' -type f -mmin +60 -delete 2>/dev/null; echo 'Stale tmp files cleaned'"

      - name: Update version_vorsitzer.json on server
        if: steps.guard.outputs.skip != 'true'
        run: |
          VERSION="${{ needs.version.outputs.version_name }}"
          BUILD="${{ needs.version.outputs.build_number }}"
          PORT="${{ secrets.DEPLOY_PORT }}"
          REMOTE="${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          SSH_BASE="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          DATA_DIR="/var/www/icd360sev.icd360s.de/api/data"

          # Compute the previous (fallback) version: drop one from the patch component.
          PREV_VERSION=$(echo "$VERSION" | awk -F. '{ if ($3 > 0) print $1"."$2"."($3-1); else print $1"."$2"."$3 }')

          # Generate version_vorsitzer.json on the runner so we can scp it (avoids
          # tricky inline JSON quoting through the SSH layer).
          cat > /tmp/version_vorsitzer.json <<JSON
          {
              "version": "$VERSION",
              "build_number": $BUILD,
              "download_url": "https://icd360sev.icd360s.de/downloads/vorsitzer/windows/vorsitzer-windows.zip",
              "fallback_url": "https://icd360sev.icd360s.de/downloads/vorsitzer/windows/vorsitzer-windows_stable.zip",
              "fallback_version": "$PREV_VERSION",
              "changelog": "Version $VERSION\n\nSee full changelog at https://github.com/${{ github.repository }}/releases/tag/v$VERSION",
              "min_version": null,
              "force_update": false,
              "release_date": "$(date -u +%Y-%m-%d)",
              "file_size": "32 MB",
              "download_url_android": "https://icd360sev.icd360s.de/downloads/vorsitzer/android/vorsitzer.apk",
              "download_url_macos": "https://icd360sev.icd360s.de/downloads/vorsitzer/macos/vorsitzer.dmg",
              "download_url_linux": "https://icd360sev.icd360s.de/downloads/vorsitzer/linux/vorsitzer.flatpak",
              "download_url_ios": "https://icd360sev.icd360s.de/downloads/vorsitzer/ios/vorsitzer.ipa"
          }
          JSON

          # Upload candidate JSON, then atomically promote ONLY if its build_number
          # is higher than what's currently on the server. Prevents older parallel
          # builds from overwriting newer ones when two releases run concurrently.
          scp $SSH_BASE -P "$PORT" /tmp/version_vorsitzer.json "$REMOTE:$DATA_DIR/version_vorsitzer.json.new"
          ssh $SSH_BASE -p "$PORT" "$REMOTE" "python3 - <<PYEOF
          import json, os
          dst = '$DATA_DIR/version_vorsitzer.json'
          new = '$DATA_DIR/version_vorsitzer.json.new'
          new_build = json.load(open(new))['build_number']
          cur_build = 0
          if os.path.exists(dst):
              try: cur_build = json.load(open(dst))['build_number']
              except: pass
          if new_build >= cur_build:
              os.rename(new, dst)
              os.system(f'chown nginx:nginx {dst}')
              print(f'version_vorsitzer.json promoted: {cur_build} -> {new_build}')
          else:
              os.remove(new)
              print(f'Skipped: server has newer build ({cur_build}), this build is {new_build}')
          PYEOF
          "

      - name: Generate changelog from git commits
        id: changelog
        if: steps.guard.outputs.skip != 'true'
        run: |
          # Extract meaningful commit messages between the previous tag and current tag.
          # Skip chore/bump/merge commits. Each remaining commit = one changelog bullet.
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          CURRENT_TAG=$(git tag --sort=-v:refname | head -1)
          echo "Generating changelog: $PREV_TAG → $CURRENT_TAG"

          # Get commit subjects, filter noise, take first 15
          CHANGES=$(git log --pretty=format:"%s" "$PREV_TAG".."$CURRENT_TAG" 2>/dev/null \
            | grep -iv "^chore:\|^bump\|^merge\|^Merge\|^wip\|^WIP" \
            | head -15 \
            | sed 's/"/\\"/g')

          if [ -z "$CHANGES" ]; then
            CHANGES="Allgemeine Verbesserungen und Fehlerbehebungen"
          fi

          # Write to file for the next step to read (avoids quoting issues)
          echo "$CHANGES" > /tmp/changelog_entries.txt
          echo "Entries:"
          cat /tmp/changelog_entries.txt

      - name: Update changelog_vorsitzer.json on server (auto from git commits)
        if: steps.guard.outputs.skip != 'true'
        run: |
          VERSION="${{ needs.version.outputs.version_name }}"
          PORT="${{ secrets.DEPLOY_PORT }}"
          REMOTE="${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          SSH_BASE="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          DATA_DIR="/var/www/icd360sev.icd360s.de/api/data"

          # Upload the changelog entries file to the server
          scp $SSH_BASE -P "$PORT" /tmp/changelog_entries.txt "$REMOTE:/tmp/changelog_entries.txt"

          # Run Python on the server to inject the entries
          ssh $SSH_BASE -p "$PORT" "$REMOTE" "python3 - <<'PYEOF'
          import json
          from datetime import datetime, timezone

          path = '$DATA_DIR/changelog_vorsitzer.json'
          version = '$VERSION'

          # Read commit messages generated by CI
          try:
              entries = [l.strip() for l in open('/tmp/changelog_entries.txt').readlines() if l.strip()]
          except:
              entries = ['Allgemeine Verbesserungen und Fehlerbehebungen']

          with open(path) as f:
              data = json.load(f)

          # Clear is_latest from all existing entries
          for v in data.get('versions', []):
              v['is_latest'] = False

          # Check if this version already exists
          existing = next((v for v in data['versions'] if v.get('version') == version), None)
          if existing is None:
              today = datetime.now(timezone.utc).strftime('%d.%m.%Y')
              data['versions'].insert(0, {
                  'version': version,
                  'date': today,
                  'changes': entries,
                  'is_latest': True,
              })
              print(f'Inserted {version} with {len(entries)} entries')
          else:
              existing['is_latest'] = True
              # Only overwrite changes if the existing entry has a GitHub stub
              if any('github.com' in c.lower() for c in existing.get('changes', [])):
                  existing['changes'] = entries
                  print(f'Replaced stub in {version} with {len(entries)} real entries')
              else:
                  print(f'{version} already has real changelog, just marked is_latest')

          data['last_updated'] = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          with open(path, 'w') as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
          import os
          try: os.remove('/tmp/changelog_entries.txt')
          except: pass
          PYEOF
          chown nginx:nginx $DATA_DIR/changelog_vorsitzer.json"
