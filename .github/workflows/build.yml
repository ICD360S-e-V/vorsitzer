name: Build & Release

on:
  workflow_dispatch:
    inputs:
      flutter_version:
        description: 'Flutter version'
        required: false
        default: '3.38.4'
      build_number:
        description: 'Build number override (leave empty for auto)'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

env:
  FLUTTER_VERSION: ${{ github.event.inputs.flutter_version || '3.38.4' }}
  JAVA_VERSION: '17'
  APP_NAME: vorsitzer

permissions:
  contents: write

# Serialize runs on the same branch so parallel pushes don't race on the
# auto-bump git tag/push step. cancel-in-progress: false → queue, don't drop.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# ============================================================
# SECRETS REQUIRED:
# ============================================================
# Android signing:
#   KEYSTORE_BASE64        - Base64-encoded .jks keystore
#   KEYSTORE_PASSWORD      - Keystore password
#   KEY_ALIAS              - Key alias name
#   KEY_PASSWORD            - Key password
#
# Apple signing (iOS + macOS):
#   APPLE_CERTIFICATE_BASE64    - Base64 .p12 distribution cert
#   APPLE_CERTIFICATE_PASSWORD  - Certificate password
#   APPLE_PROVISIONING_PROFILE  - Base64 provisioning profile (iOS)
#   MACOS_CERTIFICATE_BASE64    - Base64 .p12 Developer ID cert
#   MACOS_CERTIFICATE_PASSWORD  - Certificate password
#   MACOS_PROVISIONING_PROFILE  - Base64 provisioning profile (macOS)
#
# Optional (for store uploads):
#   GOOGLE_PLAY_SERVICE_ACCOUNT_JSON - Google Play API key
#   HUAWEI_APP_ID                    - Huawei AppGallery App ID
#   HUAWEI_CLIENT_ID                 - Huawei API Client ID
#   HUAWEI_CLIENT_SECRET             - Huawei API Client Secret
# ============================================================

jobs:
  # ──────────────────────────────────────────────
  # Determine version info (shared by all jobs)
  # ──────────────────────────────────────────────
  version:
    name: "📋 Version Info"
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - uses: actions/checkout@v6
      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION_LINE=$(grep '^version:' pubspec.yaml)
          VERSION_NAME=$(echo "$VERSION_LINE" | sed 's/version: //' | cut -d'+' -f1)
          BUILD_NUMBER_DEFAULT=$(echo "$VERSION_LINE" | sed 's/version: //' | cut -d'+' -f2)
          BUILD_NUMBER="${{ github.event.inputs.build_number }}"
          if [ -z "$BUILD_NUMBER" ]; then
            BUILD_NUMBER="$BUILD_NUMBER_DEFAULT"
          fi
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION_NAME+$BUILD_NUMBER"

      - name: Verify update_service.dart matches pubspec.yaml
        run: |
          # The footer in the running app reads UpdateService.currentVersion /
          # currentBuildNumber, which are hardcoded constants in
          # lib/services/update_service.dart. If they desync from pubspec.yaml,
          # the user sees the wrong version in the footer (and the changelog
          # dialog will not match the running build). Fail the build EARLY so
          # the developer notices before publishing the release.
          VERSION_NAME="${{ steps.version.outputs.version_name }}"
          BUILD_NUMBER="${{ steps.version.outputs.build_number }}"
          DART_VERSION=$(grep -oE "currentVersion = '[^']*'" lib/services/update_service.dart | sed -E "s/currentVersion = '([^']*)'/\\1/")
          DART_BUILD=$(grep -oE 'currentBuildNumber = [0-9]+' lib/services/update_service.dart | awk '{print $3}')
          echo "  pubspec.yaml          → $VERSION_NAME+$BUILD_NUMBER"
          echo "  update_service.dart   → $DART_VERSION+$DART_BUILD"
          if [ "$DART_VERSION" != "$VERSION_NAME" ] || [ "$DART_BUILD" != "$BUILD_NUMBER" ]; then
            echo "::error file=lib/services/update_service.dart::Version mismatch — bump currentVersion='$VERSION_NAME' / currentBuildNumber=$BUILD_NUMBER to match pubspec.yaml"
            exit 1
          fi
          echo "  ✅ versions match"

  # ══════════════════════════════════════════════
  #  ANDROID BUILDS
  # ══════════════════════════════════════════════

  # ──────────────────────────────────────────────
  # 1. Android Universal APK (fat APK, all ABIs)
  # ──────────────────────────────────────────────
  android-universal:
    name: "🤖 Android Universal APK"
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build Universal APK
        run: |
          flutter build apk \
            --release \
            --dart-define=TURN_HOST=${{ secrets.TURN_HOST }} \
            --dart-define=TURN_USER=${{ secrets.TURN_USER }} \
            --dart-define=TURN_CRED=${{ secrets.TURN_CRED }} \
            --dart-define=HAFAS_AID=${{ secrets.HAFAS_AID }} \
            --build-name=${{ needs.version.outputs.version_name }} \
            --build-number=${{ needs.version.outputs.build_number }}

      - name: Rename artifact
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/${{ env.APP_NAME }}-${{ needs.version.outputs.version_name }}-universal.apk

      - uses: actions/upload-artifact@v7
        with:
          name: android-universal-apk
          path: build/app/outputs/flutter-apk/${{ env.APP_NAME }}-*-universal.apk

  # ──────────────────────────────────────────────
  # 2. Samsung Galaxy Store APK (per-ABI splits)
  # ──────────────────────────────────────────────
  android-samsung:
    name: "📱 Samsung Galaxy Store"
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build split APKs per ABI
        run: |
          flutter build apk \
            --release \
            --dart-define=TURN_HOST=${{ secrets.TURN_HOST }} \
            --dart-define=TURN_USER=${{ secrets.TURN_USER }} \
            --dart-define=TURN_CRED=${{ secrets.TURN_CRED }} \
            --dart-define=HAFAS_AID=${{ secrets.HAFAS_AID }} \
            --split-per-abi \
            --build-name=${{ needs.version.outputs.version_name }} \
            --build-number=${{ needs.version.outputs.build_number }}

      - name: Rename artifacts
        run: |
          cd build/app/outputs/flutter-apk
          for f in app-*-release.apk; do
            ABI=$(echo "$f" | sed 's/app-\(.*\)-release.apk/\1/')
            mv "$f" "${{ env.APP_NAME }}-${{ needs.version.outputs.version_name }}-samsung-${ABI}.apk"
          done

      - uses: actions/upload-artifact@v7
        with:
          name: samsung-apks
          path: build/app/outputs/flutter-apk/${{ env.APP_NAME }}-*-samsung-*.apk

  # ──────────────────────────────────────────────
  # 3. Google Play AAB
  # ──────────────────────────────────────────────
  android-googleplay:
    name: "▶️ Google Play AAB"
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build AAB
        run: |
          flutter build appbundle \
            --release \
            --dart-define=TURN_HOST=${{ secrets.TURN_HOST }} \
            --dart-define=TURN_USER=${{ secrets.TURN_USER }} \
            --dart-define=TURN_CRED=${{ secrets.TURN_CRED }} \
            --dart-define=HAFAS_AID=${{ secrets.HAFAS_AID }} \
            --build-name=${{ needs.version.outputs.version_name }} \
            --build-number=${{ needs.version.outputs.build_number }}

      - name: Rename artifact
        run: |
          mv build/app/outputs/bundle/release/app-release.aab \
             build/app/outputs/bundle/release/${{ env.APP_NAME }}-${{ needs.version.outputs.version_name }}-googleplay.aab

      - uses: actions/upload-artifact@v7
        with:
          name: googleplay-aab
          path: build/app/outputs/bundle/release/${{ env.APP_NAME }}-*-googleplay.aab

  # ──────────────────────────────────────────────
  # 4. F-Droid APK (no proprietary dependencies)
  # ──────────────────────────────────────────────
  android-fdroid:
    name: "🔓 F-Droid APK"
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build F-Droid APK
        run: |
          flutter build apk \
            --release \
            --dart-define=TURN_HOST=${{ secrets.TURN_HOST }} \
            --dart-define=TURN_USER=${{ secrets.TURN_USER }} \
            --dart-define=TURN_CRED=${{ secrets.TURN_CRED }} \
            --dart-define=HAFAS_AID=${{ secrets.HAFAS_AID }} \
            --dart-define=STORE=fdroid \
            --build-name=${{ needs.version.outputs.version_name }} \
            --build-number=${{ needs.version.outputs.build_number }}

      - name: Rename artifact
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/${{ env.APP_NAME }}-${{ needs.version.outputs.version_name }}-fdroid.apk

      - uses: actions/upload-artifact@v7
        with:
          name: fdroid-apk
          path: build/app/outputs/flutter-apk/${{ env.APP_NAME }}-*-fdroid.apk

  # ──────────────────────────────────────────────
  # 5. Huawei AppGallery APK
  # ──────────────────────────────────────────────
  android-huawei:
    name: "📲 Huawei AppGallery"
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build Huawei APK
        run: |
          flutter build apk \
            --release \
            --dart-define=TURN_HOST=${{ secrets.TURN_HOST }} \
            --dart-define=TURN_USER=${{ secrets.TURN_USER }} \
            --dart-define=TURN_CRED=${{ secrets.TURN_CRED }} \
            --dart-define=HAFAS_AID=${{ secrets.HAFAS_AID }} \
            --dart-define=STORE=huawei \
            --build-name=${{ needs.version.outputs.version_name }} \
            --build-number=${{ needs.version.outputs.build_number }}

      - name: Rename artifact
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/${{ env.APP_NAME }}-${{ needs.version.outputs.version_name }}-huawei.apk

      - uses: actions/upload-artifact@v7
        with:
          name: huawei-apk
          path: build/app/outputs/flutter-apk/${{ env.APP_NAME }}-*-huawei.apk

  # ══════════════════════════════════════════════
  #  DESKTOP BUILDS
  # ══════════════════════════════════════════════

  # ──────────────────────────────────────────────
  # 6. Windows (MSIX + ZIP)
  # ──────────────────────────────────────────────
  windows:
    name: "🪟 Windows"
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release --dart-define=TURN_HOST=${{ secrets.TURN_HOST }} --dart-define=TURN_USER=${{ secrets.TURN_USER }} --dart-define=TURN_CRED=${{ secrets.TURN_CRED }} --dart-define=HAFAS_AID=${{ secrets.HAFAS_AID }} --build-name=${{ needs.version.outputs.version_name }} --build-number=${{ needs.version.outputs.build_number }}

      - name: Create ZIP archive
        shell: pwsh
        run: |
          $version = "${{ needs.version.outputs.version_name }}"
          Compress-Archive `
            -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath "build\${{ env.APP_NAME }}-${version}-windows-x64.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: windows-zip
          path: build/${{ env.APP_NAME }}-*-windows-x64.zip

  # ──────────────────────────────────────────────
  # 6b. Linux (tar.gz)
  # ──────────────────────────────────────────────
  linux:
    name: "🐧 Linux"
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake git ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsecret-1-dev libsecret-1-0 libjsoncpp-dev \
            libayatana-appindicator3-dev \
            libmpv-dev mpv

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: |
          flutter config --enable-linux-desktop
          flutter build linux \
            --release \
            --dart-define=TURN_HOST=${{ secrets.TURN_HOST }} \
            --dart-define=TURN_USER=${{ secrets.TURN_USER }} \
            --dart-define=TURN_CRED=${{ secrets.TURN_CRED }} \
            --dart-define=HAFAS_AID=${{ secrets.HAFAS_AID }} \
            --build-name=${{ needs.version.outputs.version_name }} \
            --build-number=${{ needs.version.outputs.build_number }}

      - name: Package tar.gz
        run: |
          VERSION="${{ needs.version.outputs.version_name }}"
          cd build/linux/x64/release/bundle
          tar -czf "../../../../../${{ env.APP_NAME }}-${VERSION}-linux-x64.tar.gz" .

      - uses: actions/upload-artifact@v7
        with:
          name: linux-targz
          path: ${{ env.APP_NAME }}-*-linux-x64.tar.gz

  # ──────────────────────────────────────────────
  # 7. macOS (DMG)
  # ──────────────────────────────────────────────
  macos:
    name: "🍎 macOS"
    needs: version
    runs-on: macos-latest
    env:
      HAS_MACOS_CERT: ${{ secrets.MACOS_CERTIFICATE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v6

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ~/.cocoapods
          key: ${{ runner.os }}-cocoapods-${{ hashFiles('macos/Podfile') }}
          restore-keys: ${{ runner.os }}-cocoapods-

      - name: Install dependencies
        run: flutter pub get

      - name: Refresh CocoaPods
        run: |
          cd macos
          rm -f Podfile.lock
          pod install --repo-update

      - name: Setup macOS signing
        if: env.HAS_MACOS_CERT == 'true'
        run: |
          echo "${{ secrets.MACOS_CERTIFICATE_BASE64 }}" | base64 -d > certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import certificate.p12 -P "${{ secrets.MACOS_CERTIFICATE_PASSWORD }}" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm certificate.p12

      - name: Disable code signing for CI (when no certs)
        if: env.HAS_MACOS_CERT == 'false'
        run: |
          # Disable signing during the Xcode build phase so it doesn't look
          # for certificates / provisioning profiles we don't have in CI.
          cat >> macos/Runner/Configs/Release.xcconfig <<'EOF'

          // CI: disable code signing during build — we ad-hoc sign post-build
          CODE_SIGN_IDENTITY =
          CODE_SIGNING_REQUIRED = NO
          CODE_SIGNING_ALLOWED = NO
          DEVELOPMENT_TEAM =
          PROVISIONING_PROFILE_SPECIFIER =
          EOF

      - name: Build macOS
        run: |
          flutter build macos \
            --release \
            --dart-define=TURN_HOST=${{ secrets.TURN_HOST }} \
            --dart-define=TURN_USER=${{ secrets.TURN_USER }} \
            --dart-define=TURN_CRED=${{ secrets.TURN_CRED }} \
            --dart-define=HAFAS_AID=${{ secrets.HAFAS_AID }} \
            --build-name=${{ needs.version.outputs.version_name }} \
            --build-number=${{ needs.version.outputs.build_number }}

      - name: Ad-hoc sign macOS app
        if: env.HAS_MACOS_CERT == 'false'
        run: |
          APP_PATH=$(find build/macos/Build/Products/Release -maxdepth 1 -name "*.app" -type d | head -1)
          echo "Ad-hoc signing: $APP_PATH"
          codesign --force --deep --sign - "$APP_PATH"
          echo "Verifying signature..."
          codesign -dvv "$APP_PATH" 2>&1 | head -10

      - name: Create DMG
        run: |
          VERSION="${{ needs.version.outputs.version_name }}"
          DMG_NAME="${{ env.APP_NAME }}-${VERSION}-macos.dmg"
          APP_PATH=$(find build/macos/Build/Products/Release -maxdepth 1 -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found in build/macos/Build/Products/Release"
            ls -la build/macos/Build/Products/Release/ || true
            exit 1
          fi
          echo "Packaging: $APP_PATH"
          hdiutil create -volname "${{ env.APP_NAME }}" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            "build/${DMG_NAME}"

      - uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: build/${{ env.APP_NAME }}-*-macos.dmg

  # ══════════════════════════════════════════════
  #  iOS BUILD
  # ══════════════════════════════════════════════

  # ──────────────────────────────────────────────
  # 8. iOS (IPA)
  # ──────────────────────────────────────────────
  ios:
    name: "📱 iOS IPA"
    needs: version
    runs-on: macos-latest
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v6

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ~/.cocoapods
          key: ${{ runner.os }}-cocoapods-${{ hashFiles('ios/Podfile') }}
          restore-keys: ${{ runner.os }}-cocoapods-

      - name: Install dependencies
        run: flutter pub get

      - name: Refresh CocoaPods
        run: |
          cd ios
          rm -f Podfile.lock
          pod install --repo-update

      - name: Setup iOS signing
        if: env.HAS_APPLE_CERT == 'true'
        run: |
          echo "${{ secrets.APPLE_CERTIFICATE_BASE64 }}" | base64 -d > certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import certificate.p12 -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm certificate.p12
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.APPLE_PROVISIONING_PROFILE }}" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Build iOS (signed)
        if: env.HAS_APPLE_CERT == 'true'
        run: |
          flutter build ipa \
            --release \
            --dart-define=TURN_HOST=${{ secrets.TURN_HOST }} \
            --dart-define=TURN_USER=${{ secrets.TURN_USER }} \
            --dart-define=TURN_CRED=${{ secrets.TURN_CRED }} \
            --dart-define=HAFAS_AID=${{ secrets.HAFAS_AID }} \
            --build-name=${{ needs.version.outputs.version_name }} \
            --build-number=${{ needs.version.outputs.build_number }} \
            --export-options-plist=ios/ExportOptions.plist

      - name: Build iOS (unsigned)
        if: env.HAS_APPLE_CERT == 'false'
        run: |
          flutter build ios \
            --release \
            --dart-define=TURN_HOST=${{ secrets.TURN_HOST }} \
            --dart-define=TURN_USER=${{ secrets.TURN_USER }} \
            --dart-define=TURN_CRED=${{ secrets.TURN_CRED }} \
            --dart-define=HAFAS_AID=${{ secrets.HAFAS_AID }} \
            --no-codesign \
            --build-name=${{ needs.version.outputs.version_name }} \
            --build-number=${{ needs.version.outputs.build_number }}

      - name: Package IPA
        run: |
          VERSION="${{ needs.version.outputs.version_name }}"
          if ls build/ios/ipa/*.ipa 1>/dev/null 2>&1; then
            mv build/ios/ipa/*.ipa "build/${{ env.APP_NAME }}-${VERSION}-ios.ipa"
          else
            mkdir -p Payload
            cp -r build/ios/iphoneos/Runner.app Payload/
            zip -r "build/${{ env.APP_NAME }}-${VERSION}-ios-unsigned.ipa" Payload
            rm -rf Payload
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: ios-ipa
          path: build/${{ env.APP_NAME }}-*-ios*.ipa

  # ══════════════════════════════════════════════
  #  GITHUB RELEASE (only on tag push)
  # ══════════════════════════════════════════════
  release:
    name: "🚀 Create Release"
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - version
      - android-universal
      - android-samsung
      - android-googleplay
      - android-fdroid
      - android-huawei
      - windows
      - linux
      - macos
      - ios
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List all artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ needs.version.outputs.version_name }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.apk
            artifacts/**/*.aab
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
            artifacts/**/*.dmg
            artifacts/**/*.ipa

  # ══════════════════════════════════════════════
  #  DEPLOY TO SERVER (only on tag push)
  # ══════════════════════════════════════════════
  deploy:
    name: "📤 Deploy to Server"
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - version
      - release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Organize artifacts with fixed filenames
        run: |
          mkdir -p deploy/{android,windows,linux,macos,ios}
          # Android — fixed names so server files get overwritten each release
          cp artifacts/android-universal-apk/*.apk deploy/android/vorsitzer.apk
          cp artifacts/fdroid-apk/*.apk            deploy/android/vorsitzer-fdroid.apk
          cp artifacts/huawei-apk/*.apk            deploy/android/vorsitzer-huawei.apk
          cp artifacts/googleplay-aab/*.aab        deploy/android/vorsitzer.aab
          for d in samsung-apks; do
            for f in artifacts/$d/*.apk; do
              arch=$(echo "$f" | grep -oP '(arm64-v8a|armeabi-v7a|x86_64)' || echo "unknown")
              cp "$f" "deploy/android/vorsitzer-samsung-${arch}.apk"
            done
          done
          # Windows
          find artifacts -type f -name "*.zip" -path "*windows*" -exec cp {} deploy/windows/vorsitzer-windows.zip \;
          # Linux
          find artifacts -type f -name "*.tar.gz" -exec cp {} deploy/linux/vorsitzer-linux.tar.gz \;
          # macOS
          find artifacts -type f -name "*.dmg" -exec cp {} deploy/macos/vorsitzer.dmg \;
          # iOS
          find artifacts -type f -name "*.ipa" -exec cp {} deploy/ios/vorsitzer.ipa \;
          echo "=== Deploy tree ==="
          find deploy -type f -exec ls -lh {} \;

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT }} -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload to server
        run: |
          BASE="${{ secrets.DEPLOY_PATH }}"
          PORT="${{ secrets.DEPLOY_PORT }}"
          REMOTE="${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          SSH_BASE="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

          ssh $SSH_BASE -p "$PORT" "$REMOTE" "mkdir -p '$BASE'/{android,windows,linux,macos,ios}"

          # Backup current → _stable, then overwrite with new release.
          # Fixed filenames mean only 1 current + 1 stable per file — no accumulation.
          for plat in android windows linux macos ios; do
            if [ -n "$(ls -A deploy/$plat/ 2>/dev/null)" ]; then
              echo "==> Backing up + uploading $plat ..."
              for f in deploy/$plat/*; do
                fname=$(basename "$f")
                ext="${fname##*.}"
                base="${fname%.*}"
                ssh $SSH_BASE -p "$PORT" "$REMOTE" \
                  "[ -f '$BASE/$plat/$fname' ] && cp '$BASE/$plat/$fname' '$BASE/$plat/${base}_stable.${ext}' || true"
                scp $SSH_BASE -P "$PORT" "$f" "$REMOTE:$BASE/$plat/$fname"
              done
            fi
          done

          ssh $SSH_BASE -p "$PORT" "$REMOTE" "chown -R nginx:nginx '$BASE' && find '$BASE' -type f | sort"

          # Remove old versioned files (vorsitzer-X.Y.Z-*) left from before the overwrite migration
          ssh $SSH_BASE -p "$PORT" "$REMOTE" "find '$BASE' -name 'vorsitzer-[0-9]*' -type f -delete 2>/dev/null; echo 'Legacy versioned files cleaned'"

      - name: Update version_vorsitzer.json on server
        run: |
          VERSION="${{ needs.version.outputs.version_name }}"
          BUILD="${{ needs.version.outputs.build_number }}"
          PORT="${{ secrets.DEPLOY_PORT }}"
          REMOTE="${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          SSH_BASE="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          DATA_DIR="/var/www/icd360sev.icd360s.de/api/data"

          # Compute the previous (fallback) version: drop one from the patch component.
          PREV_VERSION=$(echo "$VERSION" | awk -F. '{ if ($3 > 0) print $1"."$2"."($3-1); else print $1"."$2"."$3 }')

          # Generate version_vorsitzer.json on the runner so we can scp it (avoids
          # tricky inline JSON quoting through the SSH layer).
          cat > /tmp/version_vorsitzer.json <<JSON
          {
              "version": "$VERSION",
              "build_number": $BUILD,
              "download_url": "https://icd360sev.icd360s.de/downloads/vorsitzer/windows/vorsitzer-windows.zip",
              "fallback_url": "https://icd360sev.icd360s.de/downloads/vorsitzer/windows/vorsitzer-windows_stable.zip",
              "fallback_version": "$PREV_VERSION",
              "changelog": "Version $VERSION\n\nSee full changelog at https://github.com/${{ github.repository }}/releases/tag/v$VERSION",
              "min_version": null,
              "force_update": false,
              "release_date": "$(date -u +%Y-%m-%d)",
              "file_size": "32 MB",
              "download_url_android": "https://icd360sev.icd360s.de/downloads/vorsitzer/android/vorsitzer.apk",
              "download_url_macos": "https://icd360sev.icd360s.de/downloads/vorsitzer/macos/vorsitzer.dmg",
              "download_url_linux": "https://icd360sev.icd360s.de/downloads/vorsitzer/linux/vorsitzer-linux.tar.gz",
              "download_url_ios": "https://icd360sev.icd360s.de/downloads/vorsitzer/ios/vorsitzer.ipa"
          }
          JSON

          # Upload candidate JSON, then atomically promote ONLY if its build_number
          # is higher than what's currently on the server. Prevents older parallel
          # builds from overwriting newer ones when two releases run concurrently.
          scp $SSH_BASE -P "$PORT" /tmp/version_vorsitzer.json "$REMOTE:$DATA_DIR/version_vorsitzer.json.new"
          ssh $SSH_BASE -p "$PORT" "$REMOTE" "python3 - <<PYEOF
          import json, os
          dst = '$DATA_DIR/version_vorsitzer.json'
          new = '$DATA_DIR/version_vorsitzer.json.new'
          new_build = json.load(open(new))['build_number']
          cur_build = 0
          if os.path.exists(dst):
              try: cur_build = json.load(open(dst))['build_number']
              except: pass
          if new_build >= cur_build:
              os.rename(new, dst)
              os.system(f'chown nginx:nginx {dst}')
              print(f'version_vorsitzer.json promoted: {cur_build} -> {new_build}')
          else:
              os.remove(new)
              print(f'Skipped: server has newer build ({cur_build}), this build is {new_build}')
          PYEOF
          "

      - name: Generate changelog from git commits
        id: changelog
        run: |
          # Extract meaningful commit messages between the previous tag and current tag.
          # Skip chore/bump/merge commits. Each remaining commit = one changelog bullet.
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          CURRENT_TAG=$(git tag --sort=-v:refname | head -1)
          echo "Generating changelog: $PREV_TAG → $CURRENT_TAG"

          # Get commit subjects, filter noise, take first 15
          CHANGES=$(git log --pretty=format:"%s" "$PREV_TAG".."$CURRENT_TAG" 2>/dev/null \
            | grep -iv "^chore:\|^bump\|^merge\|^Merge\|^wip\|^WIP" \
            | head -15 \
            | sed 's/"/\\"/g')

          if [ -z "$CHANGES" ]; then
            CHANGES="Allgemeine Verbesserungen und Fehlerbehebungen"
          fi

          # Write to file for the next step to read (avoids quoting issues)
          echo "$CHANGES" > /tmp/changelog_entries.txt
          echo "Entries:"
          cat /tmp/changelog_entries.txt

      - name: Update changelog_vorsitzer.json on server (auto from git commits)
        run: |
          VERSION="${{ needs.version.outputs.version_name }}"
          PORT="${{ secrets.DEPLOY_PORT }}"
          REMOTE="${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          SSH_BASE="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          DATA_DIR="/var/www/icd360sev.icd360s.de/api/data"

          # Upload the changelog entries file to the server
          scp $SSH_BASE -P "$PORT" /tmp/changelog_entries.txt "$REMOTE:/tmp/changelog_entries.txt"

          # Run Python on the server to inject the entries
          ssh $SSH_BASE -p "$PORT" "$REMOTE" "python3 - <<'PYEOF'
          import json
          from datetime import datetime, timezone

          path = '$DATA_DIR/changelog_vorsitzer.json'
          version = '$VERSION'

          # Read commit messages generated by CI
          try:
              entries = [l.strip() for l in open('/tmp/changelog_entries.txt').readlines() if l.strip()]
          except:
              entries = ['Allgemeine Verbesserungen und Fehlerbehebungen']

          with open(path) as f:
              data = json.load(f)

          # Clear is_latest from all existing entries
          for v in data.get('versions', []):
              v['is_latest'] = False

          # Check if this version already exists
          existing = next((v for v in data['versions'] if v.get('version') == version), None)
          if existing is None:
              today = datetime.now(timezone.utc).strftime('%d.%m.%Y')
              data['versions'].insert(0, {
                  'version': version,
                  'date': today,
                  'changes': entries,
                  'is_latest': True,
              })
              print(f'Inserted {version} with {len(entries)} entries')
          else:
              existing['is_latest'] = True
              # Only overwrite changes if the existing entry has a GitHub stub
              if any('github.com' in c.lower() for c in existing.get('changes', [])):
                  existing['changes'] = entries
                  print(f'Replaced stub in {version} with {len(entries)} real entries')
              else:
                  print(f'{version} already has real changelog, just marked is_latest')

          data['last_updated'] = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          with open(path, 'w') as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
          import os
          try: os.remove('/tmp/changelog_entries.txt')
          except: pass
          PYEOF
          chown nginx:nginx $DATA_DIR/changelog_vorsitzer.json"
