name: Build Android (priority)

# ───────────────────────────────────────────────────────────────
# PRIORITY WORKFLOW — Android Universal APK (fast)
#
# Mirror image of build.yml (Linux + Flatpak): runs on the self-hosted
# Linux runner on 10.10.10.60 (Ubuntu 26.04 LTS, 8 vCPU/30 GB/97 GB
# NVMe). JDK 17, Flutter SDK /opt/flutter, Android SDK
# (cmdline-tools + platforms;android-36 + build-tools) are pre-
# installed on the VM. The NVMe IS the cache — no actions/cache.
#
# On every `git push` of a tag like vX.Y.Z+N, this workflow:
#   1. Reads version + build_number from pubspec.yaml.
#   2. Builds the signed Universal APK on the self-hosted runner.
#   3. Uploads the APK to the matching GitHub Release as
#      `vorsitzer.apk` (stable filename → `releases/latest/download/`
#      resolves to it automatically) AND as `vorsitzer-VERSION.apk`
#      for a permanent versioned link.
#   4. Patches the icd360sev `version_vorsitzer.json` so the
#      in-app update check returns the new build number + GitHub
#      release URL — Android clients auto-detect and download.
#
# Why a GitHub Release URL instead of icd360sev for Android?
# The owner wants Android updates served straight from GitHub so
# bandwidth/CDN comes from there and the APK is independent of the
# internal infra. The version_vorsitzer.json on icd360sev still
# drives the in-app "is there an update?" probe — only the
# `download_url_android` field flips to the GitHub URL.
# ───────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number override (leave empty for auto)'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

env:
  APP_NAME: vorsitzer

# Read-only by default. Only the publish job needs `contents: write`
# to upload the APK to a GitHub Release.
permissions:
  contents: read

# Single concurrency lane across ALL refs. When a newer tag arrives while
# an older Android build is still running/queued, the older one is cancelled —
# only the latest version's APK ships to GitHub Release + server JSON.
concurrency:
  group: vorsitzer-android
  cancel-in-progress: true

# ============================================================
# SECRETS REQUIRED:
# ============================================================
# Android signing:
#   KEYSTORE_BASE64 / KEYSTORE_PASSWORD / KEY_PASSWORD / KEY_ALIAS
#
# Runtime dart-defines (must match build.yml exactly):
#   TURN_HOST (TURN creds are now ephemeral — fetched at runtime via api/auth/turn_credentials.php)
#   HAFAS_AID
#   ROUTINE_AES_KEY_V2
#   VORSITZER_STARTUP_DIAG_KEY
#
# Server JSON update (icd360sev):
#   DEPLOY_HOST / DEPLOY_PORT / DEPLOY_USER / DEPLOY_SSH_KEY
# ============================================================

jobs:
  # ──────────────────────────────────────────────
  # Determine version info from pubspec.yaml
  # ──────────────────────────────────────────────
  version:
    name: "📋 Version Info"
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Extract version from pubspec.yaml
        id: version
        env:
          INPUT_BUILD_NUMBER: ${{ github.event.inputs.build_number }}
        run: |
          set -euo pipefail
          VERSION_LINE=$(grep '^version:' pubspec.yaml)
          VERSION_NAME=$(echo "$VERSION_LINE" | sed 's/version: //' | cut -d'+' -f1)
          BUILD_NUMBER_DEFAULT=$(echo "$VERSION_LINE" | sed 's/version: //' | cut -d'+' -f2)
          BUILD_NUMBER="${INPUT_BUILD_NUMBER:-$BUILD_NUMBER_DEFAULT}"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION_NAME+$BUILD_NUMBER"

  # ──────────────────────────────────────────────
  # Static analysis — run BEFORE the APK build so we fail in ~30s
  # instead of wasting 10+ min on a build whose artifact would be
  # thrown away. Mirror of the analyze job in build.yml but on
  # ubuntu-latest (Android-side runs on cloud since 3d8932f0).
  # ──────────────────────────────────────────────
  analyze:
    name: "🔍 Static analysis"
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2  # v2
        with:
          flutter-version: '3.38.4'
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        # Same tolerance as build.yml — errors fail the build, warnings
        # and infos are accepted until the Radio→RadioGroup migration is
        # finished and the residual unused private fields are cleaned up.
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

  # ──────────────────────────────────────────────
  # Android Universal APK (fat APK, all ABIs)
  # ──────────────────────────────────────────────
  android-universal:
    name: "🤖 Android Universal APK"
    needs: [version, analyze]
    # GitHub-hosted: doesn't compete with our self-hosted runner (which is
    # serving Linux + Flatpak builds + the mail/mitglieder repos). Includes
    # setup-java + flutter-action explicitly since cloud runners don't have
    # Flutter/JDK preinstalled. gradle/pub caches reset every run, accepted
    # trade-off for not blocking the on-prem runner.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          distribution: 'temurin'
          # JDK 21: the edge_detection plugin (Dokument-Scanner) declares Java 21,
          # which fails on JDK 17 with "invalid source release: 21". JDK 21 builds
          # both the plugin (21) and the app (Java 17 target) fine.
          java-version: '21'
          cache: 'gradle'

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2  # v2
        with:
          flutter-version: '3.38.4'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -euo pipefail
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF
          chmod 600 android/app/upload-keystore.jks android/key.properties

      - name: Build Universal APK
        env:
          TURN_HOST: ${{ secrets.TURN_HOST }}
          HAFAS_AID: ${{ secrets.HAFAS_AID }}
          ROUTINE_AES_KEY_V2: ${{ secrets.ROUTINE_AES_KEY_V2 }}
          STARTUP_DIAG_KEY: ${{ secrets.VORSITZER_STARTUP_DIAG_KEY }}
          VERSION_NAME: ${{ needs.version.outputs.version_name }}
          BUILD_NUMBER: ${{ needs.version.outputs.build_number }}
        run: |
          set -euo pipefail
          flutter build apk \
            --release \
            --dart-define=TURN_HOST="$TURN_HOST" \
            --dart-define=HAFAS_AID="$HAFAS_AID" \
            --dart-define=ROUTINE_AES_KEY_V2="$ROUTINE_AES_KEY_V2" \
            --dart-define=STARTUP_DIAG_KEY="$STARTUP_DIAG_KEY" \
            --build-name="$VERSION_NAME" \
            --build-number="$BUILD_NUMBER"

      - name: Stage APKs (stable + versioned names)
        env:
          VERSION_NAME: ${{ needs.version.outputs.version_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          # The update_service.dart in the app uses Platform.isAndroid to pick
          # `download_url_android` and then downloads "icd360sev_vorsitzer.apk"
          # by its content, so the filename on GitHub doesn't have to match
          # that. We ship two names for convenience:
          #   - vorsitzer.apk           → stable, resolves via
          #     releases/latest/download/vorsitzer.apk
          #   - vorsitzer-X.Y.Z.apk     → permanent versioned link
          cp build/app/outputs/flutter-apk/app-release.apk dist/${APP_NAME}.apk
          cp build/app/outputs/flutter-apk/app-release.apk \
             dist/${APP_NAME}-${VERSION_NAME}.apk
          ls -lh dist/

      - name: Cleanup keystore from workspace
        if: always()
        run: |
          rm -f android/app/upload-keystore.jks android/key.properties

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: android-universal-apk
          path: dist/*.apk

  # ──────────────────────────────────────────────
  # Publish APK to the GitHub Release for this tag
  # ──────────────────────────────────────────────
  publish-release:
    name: "🚀 Publish to GitHub Release"
    needs: [version, android-universal]
    if: startsWith(github.ref, 'refs/tags/v')
    # GitHub-hosted: `gh` CLI is preinstalled here but NOT on our self-hosted
    # Linux runner. This job only downloads the APK artifact and uploads it
    # to the Release — no Flutter / Android SDK needed.
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: android-universal-apk
          path: dist

      - name: Ensure release exists (build.yml usually creates it first)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REF_NAME: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5 6; do
            if gh release view "$GH_REF_NAME" --repo "$GH_REPO" >/dev/null 2>&1; then
              echo "Release $GH_REF_NAME exists."
              exit 0
            fi
            echo "Release not yet present, retrying in 30s ($i/6)..."
            sleep 30
          done
          # build.yml's release job hasn't run (or failed). Create our own so
          # the upload step has somewhere to go.
          gh release create "$GH_REF_NAME" \
            --repo "$GH_REPO" \
            --generate-notes \
            --title "$GH_REF_NAME"

      - name: Upload APKs to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REF_NAME: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release upload "$GH_REF_NAME" dist/*.apk --clobber --repo "$GH_REPO"
          echo "✅ APK uploaded. Stable URL:"
          echo "    https://github.com/$GH_REPO/releases/latest/download/${APP_NAME}.apk"

      # ────────────────────────────────────────────
      # Publish version_vorsitzer.json directly as a Release asset.
      # App fetches it from `releases/latest/download/version_vorsitzer.json`
      # — no SSH to internal server, no Device Key auth, runs entirely on
      # cloud. Replaces the old SSH→icd360sev update-version-json job.
      # ────────────────────────────────────────────
      - name: Generate + upload version_vorsitzer.json to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REF_NAME: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.version.outputs.version_name }}
          BUILD: ${{ needs.version.outputs.build_number }}
        run: |
          set -euo pipefail
          export GH_URL="https://github.com/${GH_REPO}/releases/download/${GH_REF_NAME}/vorsitzer.apk"
          export RELEASE_DATE="$(date -u +%Y-%m-%d)"
          # Python-generated to JSON-encode all untrusted values safely.
          # Wrapped in {"success": true, ...} so the app code reads it the
          # same way as the old icd360sev PHP response — no client change
          # needed beyond swapping versionUrl.
          python3 - <<'PY' > version_vorsitzer.json
          import json, os
          json.dump({
              'success':              True,
              'version':              os.environ['VERSION'],
              'build_number':         int(os.environ['BUILD']),
              'download_url_android': os.environ['GH_URL'],
              'download_url':         os.environ['GH_URL'],
              'release_date':         os.environ['RELEASE_DATE'],
              'changelog':            (
                  f"Version {os.environ['VERSION']}\n\n"
                  f"See full changelog at "
                  f"https://github.com/{os.environ['GH_REPO']}/releases/tag/{os.environ['GH_REF_NAME']}"
              ),
          }, open('/dev/stdout', 'w'), indent=2)
          PY
          gh release upload "$GH_REF_NAME" version_vorsitzer.json --clobber --repo "$GH_REPO"
          echo "✅ version_vorsitzer.json uploaded. Stable URL:"
          echo "    https://github.com/$GH_REPO/releases/latest/download/version_vorsitzer.json"
