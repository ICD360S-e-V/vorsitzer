name: Release (auto-bump + build)

# ═══════════════════════════════════════════════════════════════
# FULLY AUTOMATIC VERSIONING — NO COMMIT CONVENTIONS NEEDED
#
# Triggers on every push to main. Analyzes the actual code changes
# (git diff) since the last tag to determine the bump type:
#
#   New files in lib/ (screens, widgets, services)  →  MINOR
#   Only modifications to existing files            →  PATCH
#   Explicit "BREAKING CHANGE" in commit message    →  MAJOR
#
# Just push your code. That's it.
# ═══════════════════════════════════════════════════════════════

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Override bump type (leave auto to detect from changes)'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

permissions:
  contents: write
  actions: write

jobs:
  bump-and-tag:
    name: "🔢 Auto-bump version + tag"
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      new_build: ${{ steps.bump.outputs.new_build }}
      skipped: ${{ steps.detect.outputs.skipped }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Detect bump type from code changes
        id: detect
        run: |
          # ── Manual override ──────────────────────────────────────
          OVERRIDE="${{ github.event.inputs.bump_type }}"
          if [[ -n "$OVERRIDE" && "$OVERRIDE" != "auto" ]]; then
            echo "bump=$OVERRIDE" >> "$GITHUB_OUTPUT"
            echo "skipped=false" >> "$GITHUB_OUTPUT"
            echo "Manual override: $OVERRIDE"
            exit 0
          fi

          # ── Find last version tag ───────────────────────────────
          LAST_TAG=$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null || echo "")

          if [[ -z "$LAST_TAG" ]]; then
            RANGE="$(git hash-object -t tree /dev/null)..HEAD"
            echo "No previous tag found, scanning entire history"
          else
            RANGE="${LAST_TAG}..HEAD"
            echo "Scanning changes since $LAST_TAG"
          fi

          # ── No commits since last tag? Skip. ────────────────────
          COMMIT_COUNT=$(git rev-list --count "$RANGE" 2>/dev/null || echo "0")
          if [[ "$COMMIT_COUNT" -eq 0 ]]; then
            echo "No new commits since last tag, skipping."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "$COMMIT_COUNT commits to analyze"

          # ── 1. Check for BREAKING CHANGE (explicit marker) ─────
          #    This is the only thing that requires intent in the
          #    commit message — because breaking changes are semantic,
          #    not detectable from file diffs alone.
          if git log "$RANGE" --format="%s %b" | grep -qiE "(BREAKING[- ]CHANGE|^[a-zA-Z]+(\([^)]+\))?!:)"; then
            echo "bump=major" >> "$GITHUB_OUTPUT"
            echo "skipped=false" >> "$GITHUB_OUTPUT"
            echo "Detected: MAJOR (breaking change in commit message)"
            exit 0
          fi

          # ── 2. Analyze actual file changes ──────────────────────
          DIFF_OUTPUT=$(git diff --name-status "$RANGE")
          echo "--- Files changed ---"
          echo "$DIFF_OUTPUT" | head -30

          # New files added under lib/ → new feature → MINOR
          NEW_LIB_FILES=$(echo "$DIFF_OUTPUT" | awk '$1 == "A" && $2 ~ /^lib\// { print $2 }')

          if [[ -n "$NEW_LIB_FILES" ]]; then
            echo ""
            echo "New lib/ files detected:"
            echo "$NEW_LIB_FILES"
            echo ""
            echo "bump=minor" >> "$GITHUB_OUTPUT"
            echo "skipped=false" >> "$GITHUB_OUTPUT"
            echo "Detected: MINOR (new files added in lib/)"
            exit 0
          fi

          # ── 3. Everything else → PATCH ──────────────────────────
          echo "bump=patch" >> "$GITHUB_OUTPUT"
          echo "skipped=false" >> "$GITHUB_OUTPUT"
          echo "Detected: PATCH (modifications only, no new lib/ files)"

      - name: Calculate new version
        if: steps.detect.outputs.skipped != 'true'
        id: bump
        run: |
          CURRENT=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          VERSION_NAME=$(echo "$CURRENT" | cut -d'+' -f1)
          BUILD_NUMBER=$(echo "$CURRENT" | cut -d'+' -f2)

          MAJOR=$(echo "$VERSION_NAME" | cut -d'.' -f1)
          MINOR=$(echo "$VERSION_NAME" | cut -d'.' -f2)
          PATCH=$(echo "$VERSION_NAME" | cut -d'.' -f3)

          BUMP_TYPE="${{ steps.detect.outputs.bump }}"
          case "$BUMP_TYPE" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_BUILD=$((BUILD_NUMBER + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          echo "Current: $CURRENT → New: $NEW_VERSION+$NEW_BUILD ($BUMP_TYPE bump)"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_build=$NEW_BUILD" >> "$GITHUB_OUTPUT"

      - name: Bump pubspec.yaml
        if: steps.detect.outputs.skipped != 'true'
        run: |
          sed -i "s/^version: .*/version: ${{ steps.bump.outputs.new_version }}+${{ steps.bump.outputs.new_build }}/" pubspec.yaml
          grep '^version:' pubspec.yaml

      - name: Bump update_service.dart
        if: steps.detect.outputs.skipped != 'true'
        run: |
          FILE="lib/services/update_service.dart"
          sed -i "s/static const String currentVersion = '.*'/static const String currentVersion = '${{ steps.bump.outputs.new_version }}'/" "$FILE"
          sed -i "s/static const int currentBuildNumber = .*/static const int currentBuildNumber = ${{ steps.bump.outputs.new_build }};/" "$FILE"
          grep 'currentVersion\|currentBuildNumber' "$FILE" | head -2

      - name: Commit + tag + push
        if: steps.detect.outputs.skipped != 'true'
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          git add pubspec.yaml lib/services/update_service.dart
          git commit -m "chore: bump to $NEW_VERSION+${{ steps.bump.outputs.new_build }} [skip ci]"
          git tag "v$NEW_VERSION"
          git push origin main "v$NEW_VERSION"
          echo "✅ Tagged v$NEW_VERSION and pushed to main"

      - name: Trigger build workflow
        if: steps.detect.outputs.skipped != 'true'
        run: |
          gh workflow run build.yml --ref "v${{ steps.bump.outputs.new_version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
