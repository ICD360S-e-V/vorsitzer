name: Release (auto-bump + build)

# ═══════════════════════════════════════════════════════════════
# FULLY AUTOMATIC SEMANTIC VERSIONING
#
# Triggers on every push to main. Reads commit messages since
# the last tag and determines the bump type automatically:
#
#   fix: / chore: / docs: / refactor: / ...  →  PATCH  (1.0.60 → 1.0.61)
#   feat: / feat(scope):                     →  MINOR  (1.0.60 → 1.1.0)
#   feat!: / fix!: / BREAKING CHANGE:        →  MAJOR  (1.0.60 → 2.0.0)
#
# Commits without a conventional prefix default to PATCH.
# The highest bump type wins when commits are mixed.
#
# You can also trigger manually and override the bump type.
#
# NEVER manually edit pubspec.yaml or update_service.dart version.
# NEVER retag the same version. This workflow handles everything.
# ═══════════════════════════════════════════════════════════════

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Override bump type (leave auto to detect from commits)'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

permissions:
  contents: write
  actions: write

jobs:
  bump-and-tag:
    name: "🔢 Auto-bump version + tag"
    # Skip the version-bump commit itself to prevent infinite loops
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      new_build: ${{ steps.bump.outputs.new_build }}
      skipped: ${{ steps.detect.outputs.skipped }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Detect bump type from commits
        id: detect
        run: |
          # If manually triggered with an explicit override, use it directly
          OVERRIDE="${{ github.event.inputs.bump_type }}"
          if [[ -n "$OVERRIDE" && "$OVERRIDE" != "auto" ]]; then
            echo "bump=$OVERRIDE" >> "$GITHUB_OUTPUT"
            echo "skipped=false" >> "$GITHUB_OUTPUT"
            echo "Manual override: $OVERRIDE"
            exit 0
          fi

          # Find the last version tag
          LAST_TAG=$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null || echo "")

          if [[ -z "$LAST_TAG" ]]; then
            COMMITS=$(git log --format="%s%n%b" HEAD)
            echo "No previous tag found, scanning entire history"
          else
            COMMITS=$(git log --format="%s%n%b" "${LAST_TAG}..HEAD")
            echo "Scanning commits since $LAST_TAG"
          fi

          # No commits since last tag? Skip.
          if [[ -z "$COMMITS" ]]; then
            echo "No new commits since last tag, skipping."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Determine bump type using Conventional Commits rules:
          #   BREAKING CHANGE: or type!:  → major
          #   feat:                       → minor
          #   everything else             → patch
          BUMP="patch"
          while IFS= read -r line; do
            # BREAKING CHANGE in commit body/footer
            if echo "$line" | grep -qiE "^BREAKING[- ]CHANGE:"; then
              BUMP="major"
              break
            fi
            # Breaking change via ! marker: feat!: fix!: refactor(scope)!:
            if echo "$line" | grep -qE "^[a-zA-Z]+(\([^)]+\))?!:"; then
              BUMP="major"
              break
            fi
            # New feature
            if echo "$line" | grep -qE "^feat(\([^)]+\))?:"; then
              BUMP="minor"
              # Keep scanning — a later commit might be major
            fi
          done <<< "$COMMITS"

          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "skipped=false" >> "$GITHUB_OUTPUT"
          echo "Detected bump type: $BUMP"

          # Show the commits that were analyzed
          echo "--- Commits analyzed ---"
          if [[ -z "$LAST_TAG" ]]; then
            git log --oneline HEAD | head -20
          else
            git log --oneline "${LAST_TAG}..HEAD" | head -20
          fi

      - name: Calculate new version
        if: steps.detect.outputs.skipped != 'true'
        id: bump
        run: |
          CURRENT=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          VERSION_NAME=$(echo "$CURRENT" | cut -d'+' -f1)
          BUILD_NUMBER=$(echo "$CURRENT" | cut -d'+' -f2)

          MAJOR=$(echo "$VERSION_NAME" | cut -d'.' -f1)
          MINOR=$(echo "$VERSION_NAME" | cut -d'.' -f2)
          PATCH=$(echo "$VERSION_NAME" | cut -d'.' -f3)

          BUMP_TYPE="${{ steps.detect.outputs.bump }}"
          case "$BUMP_TYPE" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_BUILD=$((BUILD_NUMBER + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_FULL="$NEW_VERSION+$NEW_BUILD"

          echo "Current: $CURRENT → New: $NEW_FULL ($BUMP_TYPE bump)"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_build=$NEW_BUILD" >> "$GITHUB_OUTPUT"
          echo "new_full=$NEW_FULL" >> "$GITHUB_OUTPUT"

      - name: Bump pubspec.yaml
        if: steps.detect.outputs.skipped != 'true'
        run: |
          sed -i "s/^version: .*/version: ${{ steps.bump.outputs.new_version }}+${{ steps.bump.outputs.new_build }}/" pubspec.yaml
          grep '^version:' pubspec.yaml

      - name: Bump update_service.dart
        if: steps.detect.outputs.skipped != 'true'
        run: |
          FILE="lib/services/update_service.dart"
          sed -i "s/static const String currentVersion = '.*'/static const String currentVersion = '${{ steps.bump.outputs.new_version }}'/" "$FILE"
          sed -i "s/static const int currentBuildNumber = .*/static const int currentBuildNumber = ${{ steps.bump.outputs.new_build }};/" "$FILE"
          grep 'currentVersion\|currentBuildNumber' "$FILE" | head -2

      - name: Commit + tag + push
        if: steps.detect.outputs.skipped != 'true'
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          git add pubspec.yaml lib/services/update_service.dart
          git commit -m "chore: bump to $NEW_VERSION+${{ steps.bump.outputs.new_build }} [skip ci]"
          git tag "v$NEW_VERSION"
          git push origin main "v$NEW_VERSION"
          echo "✅ Tagged v$NEW_VERSION and pushed to main"

      - name: Trigger build workflow
        if: steps.detect.outputs.skipped != 'true'
        run: |
          gh workflow run build.yml --ref "v${{ steps.bump.outputs.new_version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
