name: Release (auto-bump + build)

# ═══════════════════════════════════════════════════════════════
# HOW TO USE:
#   1. Push your code changes to main (features, fixes, etc.)
#   2. Go to Actions → "Release (auto-bump + build)" → Run workflow
#   3. Done. Version bump, tag, build, deploy — all automatic.
#
# NEVER manually edit pubspec.yaml or update_service.dart version.
# NEVER retag the same version. This workflow handles everything.
# ═══════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor

permissions:
  contents: write
  actions: write

jobs:
  bump-and-tag:
    name: "🔢 Auto-bump version + tag"
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      new_build: ${{ steps.bump.outputs.new_build }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Calculate new version
        id: bump
        run: |
          # Read current version from pubspec.yaml
          CURRENT=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          VERSION_NAME=$(echo "$CURRENT" | cut -d'+' -f1)
          BUILD_NUMBER=$(echo "$CURRENT" | cut -d'+' -f2)

          MAJOR=$(echo "$VERSION_NAME" | cut -d'.' -f1)
          MINOR=$(echo "$VERSION_NAME" | cut -d'.' -f2)
          PATCH=$(echo "$VERSION_NAME" | cut -d'.' -f3)

          BUMP_TYPE="${{ github.event.inputs.bump_type }}"
          if [ "$BUMP_TYPE" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_BUILD=$((BUILD_NUMBER + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_FULL="$NEW_VERSION+$NEW_BUILD"

          echo "Current: $CURRENT → New: $NEW_FULL ($BUMP_TYPE)"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_build=$NEW_BUILD" >> "$GITHUB_OUTPUT"
          echo "new_full=$NEW_FULL" >> "$GITHUB_OUTPUT"

      - name: Bump pubspec.yaml
        run: |
          sed -i "s/^version: .*/version: ${{ steps.bump.outputs.new_version }}+${{ steps.bump.outputs.new_build }}/" pubspec.yaml
          grep '^version:' pubspec.yaml

      - name: Bump update_service.dart
        run: |
          FILE="lib/services/update_service.dart"
          sed -i "s/static const String currentVersion = '.*'/static const String currentVersion = '${{ steps.bump.outputs.new_version }}'/" "$FILE"
          sed -i "s/static const int currentBuildNumber = .*/static const int currentBuildNumber = ${{ steps.bump.outputs.new_build }};/" "$FILE"
          grep 'currentVersion\|currentBuildNumber' "$FILE" | head -2

      - name: Commit + tag + push
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          git add pubspec.yaml lib/services/update_service.dart
          git commit -m "chore: bump to $NEW_VERSION+${{ steps.bump.outputs.new_build }}"
          git tag "v$NEW_VERSION"
          git push origin main "v$NEW_VERSION"
          echo "✅ Tagged v$NEW_VERSION and pushed to main"

      - name: Trigger build workflow
        run: |
          # GitHub doesn't trigger workflows from GITHUB_TOKEN pushes (loop prevention).
          # We explicitly dispatch the build workflow for the new tag.
          gh workflow run build.yml --ref "v${{ steps.bump.outputs.new_version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
