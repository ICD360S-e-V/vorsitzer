<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrow2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrow3" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="white"/>
  
  <!-- Arrow 1 - Top (Integration) -->
  <g transform="translate(256, 256)">
    <path d="M0 -190 L60 -95 L24 -95 L24 -30 L-24 -30 L-24 -95 L-60 -95 Z" 
          fill="url(#arrow1)"/>
  </g>
  
  <!-- Arrow 2 - Bottom-left (Chancen) - rotated 120 degrees -->
  <g transform="translate(256, 256) rotate(120)">
    <path d="M0 -190 L60 -95 L24 -95 L24 -30 L-24 -30 L-24 -95 L-60 -95 Z" 
          fill="url(#arrow2)"/>
  </g>
  
  <!-- Arrow 3 - Bottom-right (Diversity) - rotated 240 degrees -->
  <g transform="translate(256, 256) rotate(240)">
    <path d="M0 -190 L60 -95 L24 -95 L24 -30 L-24 -30 L-24 -95 L-60 -95 Z" 
          fill="url(#arrow3)"/>
  </g>
  
  <!-- Letter I - TOP arrow (moved down) -->
  <text x="256" y="132" font-family="Arial, sans-serif" font-size="55" font-weight="bold" fill="white" text-anchor="middle">I</text>
  
  <!-- Letter C - BOTTOM-LEFT arrow (moved up) -->
  <text x="145" y="340" font-family="Arial, sans-serif" font-size="55" font-weight="bold" fill="white" text-anchor="middle">C</text>
  
  <!-- Letter D - BOTTOM-RIGHT arrow (moved up) -->
  <text x="367" y="340" font-family="Arial, sans-serif" font-size="55" font-weight="bold" fill="white" text-anchor="middle">D</text>
  
  <!-- Center hub -->
  <circle cx="256" cy="256" r="75" fill="white" stroke="url(#grad2)" stroke-width="6"/>
  
  <!-- 360° text in center -->
  <text x="256" y="250" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#1e3a5f" text-anchor="middle">360°</text>
  <text x="256" y="290" font-family="Arial, sans-serif" font-size="20" fill="#64748b" text-anchor="middle">Support</text>
  
  <!-- Rotating arc around center -->
  <circle cx="256" cy="256" r="92" fill="none" stroke="url(#grad2)" stroke-width="5" stroke-dasharray="120,30" stroke-linecap="round"/>
</svg>
