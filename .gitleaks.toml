# Gitleaks config for Vorsitzer — repo is PUBLIC, so custom rules are stricter
# than default. Goal: prevent committing AES keys, DB passwords, SSH refs, etc.
# Used both by the local pre-commit hook (.git/hooks/pre-commit) and CI.
#
# Test a single file:    gitleaks detect --no-git --source <file> -c .gitleaks.toml
# Test staged changes:   gitleaks protect --staged -c .gitleaks.toml

title = "Vorsitzer secret detection"

[extend]
useDefault = true

# ─── Custom rules ───────────────────────────────────────────────────────────

[[rules]]
id = "flutter-aes-key-literal"
description = "AES key literal embedded in Dart source (use --dart-define instead)"
regex = '''Key\.(fromBase16|fromUtf8|fromBase64)\s*\(\s*['"][A-Za-z0-9+/=]{16,}['"]\s*\)'''
tags = ["key", "aes", "flutter"]

[[rules]]
id = "hardcoded-password-assignment"
description = "Hardcoded password / passwd / DB_PASS assignment"
regex = '''(?i)(password|passwd|db[_-]?pass(word)?|api[_-]?secret)\s*[:=]\s*['"][^'"\s]{6,}['"]'''
tags = ["password"]

[[rules]]
id = "vorsitzer-known-leaked-securedb"
description = "Previously leaked DB password family — never reintroduce"
regex = '''SecureDB\d{4}'''
tags = ["historical", "vorsitzer"]

[[rules]]
id = "vorsitzer-known-leaked-aes-routine"
description = "Previously leaked AES key for routines — never reintroduce"
regex = '''52307574316e336e4175666734623321494344333630532d323032365f4b6579'''
tags = ["historical", "vorsitzer"]

[[rules]]
id = "ssh-runnable-command"
description = "ssh command with -i <key> -p <port> root@host pattern (copy-pasteable attack target)"
regex = '''ssh\s+-i\s+\S+\s+-p\s+\d+\s+\w+@\S+\.\S+'''
tags = ["ssh"]

[[rules]]
id = "long-hex-string-likely-key"
description = "64-char hex literal (256-bit key) embedded in source"
regex = '''['"\(\s][0-9a-fA-F]{64}['"\)\s,;]'''
tags = ["key", "hex"]

# ─── Allowlist for known-safe content ──────────────────────────────────────

[allowlist]
description = "Known-safe content that triggers default rules but is not a leak"

paths = [
  '''pubspec\.lock$''',
  '''\.git/''',
  '''build/''',
  '''^downloads/''',
  '''generated_plugin''',
  # The gitleaks config itself contains literal patterns of past leaks (so it can detect them).
  # Don't recursively flag them.
  '''^\.gitleaks\.toml$''',
]

regexes = [
  # Public root CA cert (ISRG Root X1 from Let's Encrypt) pinned in http_client_factory.dart
  # Long-lived, public knowledge, not a secret
  '''ISRG Root X1''',
  # Long Base64 string that's actually the cert body, not a key
  '''MIIFazCCA1OgAwIBAgIRAIIQz7DSQONZRGPgu2OCiwAw''',
  # Commit SHAs at the start of a line (git log dumps in changelogs / docs)
  '''^[0-9a-f]{7,40}\s''',
]
