app-id: de.icd360s.Vorsitzer
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: icd360sev_vorsitzer
separate-locales: false

finish-args:
  # GUI (Wayland-first, X11 fallback)
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # Sound (just_audio + WebRTC voice/video calls)
  - --socket=pulseaudio
  # Network (HTTP/WebSocket/WebRTC backend)
  - --share=network
  # Camera + microphone (for video calls + ID scan)
  - --device=all
  # File access
  - --filesystem=home
  - --filesystem=xdg-download
  - --filesystem=xdg-documents
  # System tray (Plasma StatusNotifierItem + Ayatana fallback)
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=com.canonical.indicator.application
  - --talk-name=org.ayatana.indicator.application
  # Desktop notifications
  - --talk-name=org.freedesktop.Notifications
  # Secret storage (flutter_secure_storage → libsecret / kwallet)
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.kde.kwalletd5
  - --talk-name=org.kde.kwalletd6
  # Auto-start on login
  - --talk-name=org.freedesktop.portal.Background
  # CEF / Chromium (webview_cef) needs unprivileged user namespaces for its
  # multi-process sandbox. Without --allow=devel the renderer crashes on
  # startup. Same flag the Chromium/Brave Flatpaks use.
  - --allow=devel

cleanup:
  - /include
  - /lib/pkgconfig
  - /lib/cmake
  - /share/aclocal
  - /share/man
  - /share/gtk-doc
  - '*.la'
  - '*.a'

modules:
  # System tray support (tray_manager Flutter plugin needs libayatana-appindicator)
  # Pulls in libdbusmenu + ayatana-ido + libayatana-indicator as transitive deps.
  # Hashes maintained by Flathub — clone shared-modules in CI before build.
  - shared-modules/libayatana-appindicator/libayatana-appindicator-gtk3.json

  # Secret storage (flutter_secure_storage needs libsecret on Linux)
  - shared-modules/libsecret/libsecret.json

  - name: vorsitzer
    buildsystem: simple
    build-commands:
      - mkdir -p /app/bin /app/share/applications /app/share/metainfo /app/share/icons/hicolor/256x256/apps
      - cp -r bundle/* /app/bin/
      - install -Dm644 de.icd360s.Vorsitzer.desktop /app/share/applications/de.icd360s.Vorsitzer.desktop
      - install -Dm644 de.icd360s.Vorsitzer.metainfo.xml /app/share/metainfo/de.icd360s.Vorsitzer.metainfo.xml
      - install -Dm644 de.icd360s.Vorsitzer.png /app/share/icons/hicolor/256x256/apps/de.icd360s.Vorsitzer.png
    sources:
      - type: dir
        path: ./bundle
        dest: bundle
      - type: file
        path: ./de.icd360s.Vorsitzer.desktop
      - type: file
        path: ./de.icd360s.Vorsitzer.metainfo.xml
      - type: file
        path: ./de.icd360s.Vorsitzer.png
